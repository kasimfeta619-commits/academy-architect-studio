<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Запитване | Academy Architect Studio</title>
    <style>
        body { background-color: #fbf9f4; color: #1a1a1a; font-family: sans-serif; margin: 0; }
        .booking-container { padding: 40px 8%; max-width: 600px; margin: 0 auto; min-height: 80vh; }
        .back-home-link { display: inline-block; margin-bottom: 20px; color: #8c8275; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .back-home-link:hover { color: #1a1a1a; }
        
        .form-card { background: #f4eee5; padding: 40px; border: 1px solid #eadecc; }
        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8c8275; font-weight: 700; }
        .form-group input, .form-group select { padding: 12px; border: 1px solid #eadecc; background: #fff; font-size: 1rem; color: #1a1a1a; outline: none; width: 100%; box-sizing: border-box; }
        
        .btn-action { background: #1a1a1a; color: #fff; padding: 15px 30px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; }
        .btn-action:hover { background: #333; }
    </style>
</head>
<body>

    <header class="navbar" style="padding: 20px 5%; border-bottom: 1px solid #eadecc; display: flex; align-items: center; background: #fbf9f4;">
        <a href="index.html" class="logo-area" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <span style="font-weight: 500; color: #1a1a1a; font-size: 1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
        </a>
    </header>

    <main class="booking-container">
        <a href="index.html" class="back-home-link">← Назад към началната страница</a>
        
        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8c8275; font-weight: 700;">КОНСУЛТАЦИЯ И ЧАС</span>
        <h1 style="font-size: 2.5rem; font-weight: 400; margin-top: 5px; color: #1a1a1a; margin-bottom: 30px;">Направете запитване</h1>

        <div class="form-card">
            <form id="bookingForm">
                <div class="form-group">
                    <label>Вашето име</label>
                    <input type="text" id="clientName" required placeholder="Иван Иванов">
                </div>
                <div class="form-group">
                    <label>Телефонен номер</label>
                    <input type="text" id="clientPhone" required placeholder="+359 888 ...">
                </div>
                <div class="form-group">
                    <label>Изберете услуга / консултация</label>
                    <select id="clientService">
                        <option value="Архитектурно проектиране">Архитектурно проектиране</option>
                        <option value="Интериорен дизайн">Интериорен дизайн</option>
                        <option value="Консултация на живо">Консултация на живо</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Желана дата и час</label>
                    <input type="datetime-local" id="clientDatetime" required>
                </div>
                <button type="submit" class="btn-action" style="margin-top: 10px;">Изпрати запитването</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            
            const newBooking = {
                name: document.getElementById('clientName',).value,
                phone: document.getElementById('clientPhone').value,
                service: document.getElementById('clientService').value,
                datetime: document.getElementById('clientDatetime').value
            };

            let bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
            bookings.push(newBooking);
            localStorage.setItem('studioBookings', JSON.stringify(bookings));

            alert('Запитването е изпратено успешно! Очаквайте свързване.');
            document.getElementById('bookingForm').reset();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
