<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Запази консултация | Архитектурно Студио</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f8fafc; color: #1e293b; padding: 40px; }
        .booking-container { max-width: 600px; background: white; margin: 0 auto; padding: 30px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 20px; }
        label { display: block; font-weight: bold; margin-bottom: 8px; color: #334155; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #cbd5e1; border-radius: 6px; font-size: 14px; }
        .btn-submit { background: #059669; color: white; border: none; padding: 12px 20px; font-size: 16px; border-radius: 6px; cursor: pointer; width: 100%; }
        .btn-submit:hover { background: #047857; }
    </style>
</head>
<body>
    <div class="booking-container">
        <h2 style="margin-top:0; color:#0f172a;">Запазете консултация с архитект</h2>
        <p style="color:#64748b;">Изберете удобен за вас ден и час за първоначален оглед или онлайн среща.</p>
        <form onsubmit="handleBooking(event)">
            <div class="form-group">
                <label>Тип услуга</label>
                <select id="service" required>
                    <option value="initial">Първоначална консултация (Безплатно - 30 мин)</option>
                    <option value="project">Обсъждане на идеен проект (100 лв)</option>
                    <option value="onsite">Оглед на място (150 лв)</option>
                </select>
            </div>
            <div class="form-group">
                <label>Желана дата и час</label>
                <input type="datetime-local" id="datetime" required>
            </div>
            <div class="form-group">
                <label>Имена</label>
                <input type="text" id="name" placeholder="Вашите имена" required>
            </div>
            <div class="form-group">
                <label>Телефон за връзка</label>
                <input type="tel" id="phone" placeholder="+359 888 123 456" required>
            </div>
            <button type="submit" class="btn-submit">Потвърди резервацията</button>
        </form>
    </div>
    <script>
        function handleBooking(e) {
            e.preventDefault();
            alert('Успешно запазихте час! Ще се свържем с вас за потвърждение.');
        }
    </script>
</body>
</html>
