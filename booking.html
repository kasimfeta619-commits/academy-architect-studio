<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Booking | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio" data-key="nav-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="estimator.html" data-key="nav-estimator">Estimator</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark</button>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="booking.html" class="btn-login active" style="margin-left: 10px;" data-key="nav-booking">Booking</a>
            <a href="login.html" class="btn-login" data-key="nav-login">Login</a>
        </div>
    </nav>

    <main style="padding: 60px 8%; max-width: 600px; margin: 0 auto;">
        <h1 data-key="nav-booking" style="font-size: 2.5rem; margin-bottom: 30px;">Booking</h1>
        
        <form id="bookingForm" style="display: flex; flex-direction: column; gap: 20px;">
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Име / Name</label>
                <input type="text" id="clientName" required style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Телефон / Phone</label>
                <input type="text" id="clientPhone" required style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Услуга / Service</label>
                <select id="clientService" style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
                    <option value="Архитектурно проектиране">Архитектурно проектиране / Architectural Design</option>
                    <option value="Интериорен дизайн">Интериорен дизайн / Interior Design</option>
                    <option value="Консултация">Консултация / Consultation</option>
                </select>
            </div>
            <div>
                <label style="display: block; margin-bottom: 8px; font-weight: 600; font-size: 0.9rem;">Желана дата и час / Date & Time</label>
                <input type="datetime-local" id="clientDatetime" required style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px;">
            </div>
            <button type="submit" class="btn-primary" style="padding: 14px; cursor: pointer; border: none; font-weight: bold; text-transform: uppercase;">Изпрати запитване</button>
        </form>
    </main>

    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
        });

        document.getElementById('bookingForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const newBooking = {
                name: document.getElementById('clientName').value,
                phone: document.getElementById('clientPhone').value,
                service: document.getElementById('clientService').value,
                datetime: document.getElementById('clientDatetime').value
            };

            let bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
            bookings.push(newBooking);
            localStorage.setItem('studioBookings', JSON.stringify(bookings));

            alert('Запитването е изпратено успешно!');
            document.getElementById('bookingForm').reset();
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
