<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Детайли за проект | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Скрипт за мигновено зареждане на темата без премигване -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        .detail-container { 
            padding: 50px 8%; 
            max-width: 1000px; 
            margin: 0 auto; 
            min-height: 80vh; 
        }
        .back-link { 
            display: inline-block; 
            margin-bottom: 20px; 
            color: #8c8275; 
            text-decoration: none; 
            font-size: 0.85rem; 
            font-weight: 600; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            transition: color 0.2s;
        }
        .back-link:hover { 
            color: #1a1a1a; 
        }
        .project-title { 
            font-size: 2.5rem; 
            font-weight: 400; 
            margin-top: 5px; 
            color: #1a1a1a; 
            margin-bottom: 15px; 
            letter-spacing: -0.5px;
        }
        .project-meta-badges { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 30px; 
            flex-wrap: wrap; 
        }
        .badge-item { 
            background: #f4eee5; 
            border: 1px solid #eadecc; 
            padding: 6px 14px; 
            font-size: 0.8rem; 
            text-transform: uppercase; 
            font-weight: 600; 
            color: #555; 
            border-radius: 4px;
        }
        .main-project-img { 
            width: 100%; 
            max-height: 550px; 
            object-fit: cover; 
            border: 1px solid #eadecc; 
            border-radius: 8px;
            margin-bottom: 40px; 
        }
        .project-description { 
            font-size: 1.05rem; 
            line-height: 1.8; 
            color: #444; 
            margin-bottom: 50px; 
            white-space: pre-line; 
        }
        .section-heading { 
            font-size: 1.5rem; 
            font-weight: 400; 
            border-bottom: 2px solid #eadecc; 
            padding-bottom: 10px; 
            margin-bottom: 25px; 
            color: #1a1a1a; 
            letter-spacing: -0.5px;
        }
        .gallery-grid { 
            display: grid; 
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); 
            gap: 20px; 
        }
        .gallery-item { 
            background: #fff; 
            border: 1px solid #eadecc; 
            padding: 10px; 
            border-radius: 8px;
        }
        .gallery-item img { 
            width: 100%; 
            height: auto; 
            display: block; 
            border-radius: 4px; 
        }
        .blueprint-card {
            background: #f4eee5; 
            border: 1px solid #eadecc; 
            padding: 20px; 
            text-align: center; 
            border-radius: 8px;
        }

        /* Dark Mode Overrides за специфичните елементи в детайлите на проекта */
        body.dark-mode .project-title,
        body.dark-mode .section-heading {
            color: #ffffff !important;
        }
        body.dark-mode .project-description {
            color: #b0b0b0 !important;
        }
        body.dark-mode .badge-item {
            background: #1e1e1e !important;
            border-color: #2c2c2c !important;
            color: #b0b0b0 !important;
        }
        body.dark-mode .main-project-img,
        body.dark-mode .gallery-item,
        body.dark-mode .blueprint-card {
            border-color: #2c2c2c !important;
            background: #1e1e1e !important;
        }
        body.dark-mode .back-link {
            color: #8c8275 !important;
        }
        body.dark-mode .back-link:hover {
            color: #ffffff !important;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Logo" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio">Academy Architect Studio</span>
        </a>
        
        <button class="menu-toggle" onclick="toggleMobileMenu()">☰</button>

        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="planner.html" data-key="nav-planner">AI Planner</a>
            <a href="estimator.html" data-key="nav-estimator">Estimator</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark</button>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <!-- Динамичен контейнер за състоянието на входа -->
            <div id="navAuthContainer">
                <a href="login.html" class="btn-login" data-key="nav-login">Login</a>
            </div>
        </div>
    </nav>

    <main class="detail-container" id="projectDetailContainer">
        <!-- Динамично зареждане на съдържанието -->
    </main>

    <footer class="main-footer">
        <div class="footer-logo-area">
            <div>
                <div class="footer-brand">Academy Architect Studio</div>
                <div class="footer-subtext" data-key="footer-subtitle">Design & Engineering</div>
            </div>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-contacts">Contacts</h4>
            <p><span id="footAddress">Sofia, Bulgaria</span></p>
            <p><a href="mailto:office@architect-studio.bg" id="footEmailLink"><span id="footEmail">office@architect-studio.bg</span></a></p>
            <p><span id="footPhone">+359 88 123 4567</span></p>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-links-title">Links</h4>
            <p><a href="index.html" data-key="nav-home">Home</a></p>
            <p><a href="catalog.html" data-key="nav-catalog">Projects</a></p>
            <p><a href="about.html" data-key="nav-about">About Us</a></p>
        </div>
        
        <div class="footer-right">
            <p data-key="footer-rights">&copy; 2026 Academy Architect Studio.<br>All rights reserved.</p>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script src="auth.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDeezhyddNjZyOeo9MyuwOuhXvFCCscUzg",
            authDomain: "architect-studio-1810c.firebaseapp.com",
            projectId: "architect-studio-1810c",
            storageBucket: "architect-studio-1810c.firebasestorage.app",
            messagingSenderId: "1053914253758",
            appId: "1:1053914253758:web:97d9bc28ac5465730311ef",
            measurementId: "G-NN7GYSF55G"
        };

        let app;
        try {
            app = initializeApp(firebaseConfig);
        } catch (e) {
            // Вече е инициализирано
        }

        // Превключване на тъмния режим
        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('siteTheme', 'dark');
            } else {
                localStorage.setItem('siteTheme', 'light');
            }
        };

        // Мобилно меню
        window.toggleMobileMenu = function() {
            const navLinks = document.getElementById('nav-links');
            navLinks.classList.toggle('mobile-open');
        };

        document.addEventListener("DOMContentLoaded", async function() {
            if (typeof initLanguage === 'function') {
                initLanguage();
            } else if (typeof setLanguage === 'function') {
                const savedLang = localStorage.getItem('siteLang') || 'bg';
                setLanguage(savedLang);
            }
            
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');
            const container = document.getElementById('projectDetailContainer');
            const currentLang = localStorage.getItem('siteLang') || localStorage.getItem('preferredLang') || 'bg';
            const areaUnit = currentLang === 'en' ? 'sq.m' : 'кв.м';
            const backText = currentLang === 'en' ? '← Back to Catalog' : '← Обратно към каталога';
            
            const textPlans = currentLang === 'en' ? 'Floor Plans' : 'Архитектурни разпределения';
            const textFacades = currentLang === 'en' ? 'Facades' : 'Фасади';
            const textSection = currentLang === 'en' ? 'Architectural Section' : 'Архитектурен разрез';
            const textGallery = currentLang === 'en' ? 'Gallery & Renders' : 'Галерия и визуализации';

            if (projectId) {
                try {
                    const dbInstance = window.db || getFirestore(app);
                    const docRef = doc(dbInstance, "projects", projectId);
                    const docSnap = await getDoc(docRef);

                    if (docSnap.exists()) {
                        const p = docSnap.data();
                        const mainImg = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';
                        
                        document.getElementById('pageTitle').textContent = `${p.title} | Academy Architect Studio`;

                        // 1. Разпределения
                        let floorPlansHtml = '';
                        const plansArr = p.floorPlans || (p.planImage ? [p.planImage] : []);
                        if (plansArr.length > 0) {
                            floorPlansHtml = `
                                <h2 class="section-heading">${textPlans}</h2>
                                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;">
                                    ${plansArr.map((plan, idx) => `
                                        <div class="blueprint-card">
                                            <p style="font-size: 0.85rem; text-transform: uppercase; color: #8c8275; margin-bottom: 10px; font-weight: 600;">${currentLang === 'en' ? 'Floor ' + (idx + 1) : 'Етаж ' + (idx + 1)}</p>
                                            <img src="${plan}" alt="Floor Plan ${idx + 1}" style="width: 100%; height: auto; border-radius: 4px;" onerror="this.parentElement.style.display='none'">
                                        </div>
                                    `).join('')}
                                </div>
                            `;
                        }

                        // 2. Фасади
                        let facadesHtml = '';
                        const facadesArr = p.facadeImages || [];
                        if (facadesArr.length > 0) {
                            facadesHtml = `
                                <h2 class="section-heading">${textFacades}</h2>
                                <div class="gallery-grid" style="margin-bottom: 40px;">
                                    ${facadesArr.map((fac, idx) => `<div class="gallery-item"><img src="${fac}" alt="Facade ${idx + 1}"></div>`).join('')}
                                </div>
                            `;
                        }

                        // 3. Разрез (Section)
                        let sectionHtml = '';
                        if (p.sectionImage) {
                            sectionHtml = `
                                <h2 class="section-heading">${textSection}</h2>
                                <div class="blueprint-card" style="margin-bottom: 40px;">
                                    <img src="${p.sectionImage}" alt="Architectural Section" style="width: 100%; max-height: 500px; object-fit: contain; border-radius: 4px;" onerror="this.parentElement.style.display='none'">
                                </div>
                            `;
                        }

                        // 4. Галерия
                        let galleryHtml = '';
                        const galleryArr = p.gallery || p.images || [];
                        if (galleryArr.length > 0) {
                            galleryHtml = `
                                <h2 class="section-heading">${textGallery}</h2>
                                <div class="gallery-grid">
                                    ${galleryArr.map(img => `<div class="gallery-item"><img src="${img}" alt="Gallery image"></div>`).join('')}
                                </div>
                            `;
                        }

                        container.innerHTML = `
                            <a href="catalog.html" class="back-link">${backText}</a>
                            
                            <h1 class="project-title">${p.title}</h1>
                            <div class="project-meta-badges">
                                ${p.style ? `<span class="badge-item">${p.style}</span>` : ''}
                                ${p.area ? `<span class="badge-item">${p.area} ${areaUnit}</span>` : ''}
                                ${p.floors ? `<span class="badge-item">${p.floors} ${currentLang === 'en' ? 'Floors' : 'етажа'}</span>` : ''}
                            </div>

                            <img src="${mainImg}" alt="${p.title}" class="main-project-img" onerror="this.src='https://placehold.co/1000x600?text=Image'">

                            <div class="project-description">
                                <p>${p.desc || p.description || ''}</p>
                            </div>

                            ${floorPlansHtml}
                            ${facadesHtml}
                            ${sectionHtml}
                            ${galleryHtml}
                        `;
                    } else {
                        container.innerHTML = `
                            <a href="catalog.html" class="back-link">${backText}</a>
                            <h2 class="project-title">${currentLang === 'en' ? 'Project not found.' : 'Проектът не е намерен.'}</h2>
                        `;
                    }
                } catch (err) {
                    console.error("Грешка при зареждане на проекта от Firebase:", err);
                    container.innerHTML = `
                        <a href="catalog.html" class="back-link">${backText}</a>
                        <h2 class="project-title">${currentLang === 'en' ? 'Error loading project.' : 'Грешка при зареждане на проекта.'}</h2>
                    `;
                }
            } else {
                container.innerHTML = `
                    <a href="catalog.html" class="back-link">${backText}</a>
                    <h2 class="project-title">${currentLang === 'en' ? 'Project not specified.' : 'Не е посочен проект.'}</h2>
                `;
            }

            // Зареждане на контактите за футъра от Firebase
            try {
                const dbInstance = window.db || getFirestore(app);
                const contactDocRef = doc(dbInstance, "siteSettings", "contact");
                const contactSnap = await getDoc(contactDocRef);

                if (contactSnap.exists()) {
                    const data = contactSnap.data();
                    if (data.address && document.getElementById('footAddress')) {
                        document.getElementById('footAddress').textContent = data.address;
                    }
                    if (data.email) {
                        if (document.getElementById('footEmail')) document.getElementById('footEmail').textContent = data.email;
                        if (document.getElementById('footEmailLink')) document.getElementById('footEmailLink').href = 'mailto:' + data.email;
                    }
                    if (data.phone && document.getElementById('footPhone')) {
                        document.getElementById('footPhone').textContent = data.phone;
                    }
                }
            } catch (e) {
                console.error('Грешка при зареждане на контактите от Firebase', e);
            }
        });
    </script>
</body>
</html>
