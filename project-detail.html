<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Детайли за проект | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #fbf9f4; color: #1a1a1a; font-family: sans-serif; margin: 0; }
        .container { padding: 40px 8%; max-width: 1000px; margin: 0 auto; min-height: 80vh; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #8c8275; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .back-link:hover { color: #1a1a1a; }
        .project-title { font-size: 2.5rem; font-weight: 400; margin-top: 5px; color: #1a1a1a; margin-bottom: 15px; }
        .project-meta-badges { display: flex; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .badge-item { background: #f4eee5; border: 1px solid #eadecc; padding: 6px 14px; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; color: #555; }
        .main-project-img { width: 100%; max-height: 550px; object-fit: cover; border: 1px solid #eadecc; margin-bottom: 40px; }
        .project-description { font-size: 1.05rem; line-height: 1.8; color: #444; margin-bottom: 50px; white-space: pre-line; }
        .section-heading { font-size: 1.5rem; font-weight: 400; border-bottom: 2px solid #eadecc; padding-bottom: 10px; margin-bottom: 25px; color: #1a1a1a; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; }
        .gallery-item { background: #fff; border: 1px solid #eadecc; padding: 10px; }
        .gallery-item img { width: 100%; height: auto; display: block; border-radius: 4px; }
    </style>
</head>
<body>

    <header class="navbar" style="padding: 20px 5%; border-bottom: 1px solid #eadecc; display: flex; align-items: center; background: #fbf9f4;">
        <a href="index.html" class="logo-area" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <img src="assets/main-graphic.png" alt="Logo" class="logo-icon" style="height: 34px; width: auto; display: block;" onerror="this.style.display='none'">
            <span style="font-weight: 500; color: #1a1a1a; font-size: 1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
        </a>
    </header>

    <main class="container" id="projectDetailContainer">
        <!-- Динамично зареждане на съдържанието -->
    </main>

    <script>
        function initLanguage() {
            // Помощна функция за поддръжка на езика, ако има такава в сайта
        }

        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
            
            const urlParams = new URLSearchParams(window.location.search);
            const projectIndex = urlParams.get('index');
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const container = document.getElementById('projectDetailContainer');
            const currentLang = localStorage.getItem('preferredLang') || 'bg';
            const areaUnit = currentLang === 'en' ? 'sq.m' : 'кв.м';
            const backText = currentLang === 'en' ? '← Back to Catalog' : '← Обратно към каталога';
            
            const textPlans = currentLang === 'en' ? 'Floor Plans' : 'Архитектурни разпределения';
            const textFacades = currentLang === 'en' ? 'Facades' : 'Фасади';
            const textGallery = currentLang === 'en' ? 'Gallery & Renders' : 'Галерия и визуализации';

            if (projectIndex !== null && projects[projectIndex]) {
                const p = projects[projectIndex];
                const mainImg = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';
                
                document.getElementById('pageTitle').textContent = `${p.title} | Academy Architect Studio`;

                // 1. Разпределения
                let floorPlansHtml = '';
                const plansArr = p.floorPlans || (p.planImage ? [p.planImage] : []);
                if (plansArr.length > 0) {
                    floorPlansHtml = `
                        <h2 class="section-heading">${textPlans}</h2>
                        <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-bottom: 40px;">
                            ${plansArr.map((plan, idx) => `
                                <div style="background: #f4eee5; border: 1px solid #eadecc; padding: 20px; text-align: center;">
                                    <p style="font-size: 0.85rem; text-transform: uppercase; color: #8c8275; margin-bottom: 10px; font-weight: 600;">${currentLang === 'en' ? 'Floor ' + (idx + 1) : 'Етаж ' + (idx + 1)}</p>
                                    <img src="${plan}" alt="Floor Plan ${idx + 1}" style="width: 100%; height: auto;" onerror="this.parentElement.style.display='none'">
                                </div>
                            `).join('')}
                        </div>
                    `;
                }

                // 2. Фасади
                let facadesHtml = '';
                const facadesArr = p.facadeImages || [];
                if (facadesArr.length > 0) {
                    facadesHtml = `
                        <h2 class="section-heading">${textFacades}</h2>
                        <div class="gallery-grid" style="margin-bottom: 40px;">
                            ${facadesArr.map((fac, idx) => `<div class="gallery-item"><img src="${fac}" alt="Facade ${idx + 1}"></div>`).join('')}
                        </div>
                    `;
                }

                // 3. Галерия
                let galleryHtml = '';
                const galleryArr = p.gallery || p.images || [];
                if (galleryArr.length > 0) {
                    galleryHtml = `
                        <h2 class="section-heading">${textGallery}</h2>
                        <div class="gallery-grid">
                            ${galleryArr.map(img => `<div class="gallery-item"><img src="${img}" alt="Gallery image"></div>`).join('')}
                        </div>
                    `;
                }

                container.innerHTML = `
                    <a href="catalog.html" class="back-link">${backText}</a>
                    
                    <h1 class="project-title">${p.title}</h1>
                    <div class="project-meta-badges">
                        ${p.style ? `<span class="badge-item">${p.style}</span>` : ''}
                        ${p.area ? `<span class="badge-item">${p.area} ${areaUnit}</span>` : ''}
                        ${p.floors ? `<span class="badge-item">${p.floors} ${currentLang === 'en' ? 'Floors' : 'етажа'}</span>` : ''}
                    </div>

                    <img src="${mainImg}" alt="${p.title}" class="main-project-img" onerror="this.src='https://placehold.co/1000x600?text=Image'">

                    <div class="project-description">
                        <p>${p.desc || p.description || ''}</p>
                    </div>

                    ${floorPlansHtml}
                    ${facadesHtml}
                    ${galleryHtml}
                `;
            } else {
                container.innerHTML = `
                    <a href="catalog.html" class="back-link">${backText}</a>
                    <h2>Проектът не е намерен.</h2>
                `;
            }
        });
    </script>
</body>
</html>
