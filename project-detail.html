<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Project | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-detail-container {
            max-width: 1000px;
            margin: 60px auto;
            padding: 0 5%;
        }
        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            font-size: 0.9rem;
            color: #8c8275;
            text-decoration: none;
            margin-bottom: 30px;
        }
        .back-link:hover {
            color: var(--text-color, #1a1a1a);
        }
        .project-title {
            font-size: 3rem;
            font-weight: normal;
            margin: 0 0 15px 0;
            line-height: 1.2;
        }
        .project-meta-badges {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            font-size: 0.95rem;
            color: #8c8275;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 40px;
        }
        .badge-item {
            background: var(--bg-secondary, #f4f1ea);
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid var(--border-color, #e6dec9);
        }
        .main-project-img {
            width: 100%;
            max-height: 550px;
            object-fit: cover;
            border-radius: 12px;
            margin-bottom: 40px;
        }
        .project-description {
            font-size: 1.1rem;
            line-height: 1.8;
            color: var(--text-color, #4a453e);
            margin-bottom: 50px;
            white-space: pre-line;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
            margin-top: 40px;
        }
        .gallery-item {
            height: 220px;
            border-radius: 8px;
            overflow: hidden;
            background: #f4f1ea;
        }
        .gallery-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio" data-key="nav-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="planner.html" data-key="nav-planner">AI Planner</a>
            <a href="estimator.html" data-key="nav-estimator">Estimator</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark</button>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="login.html" class="btn-login" data-key="nav-login">Login</a>
        </div>
    </nav>

    <main class="project-detail-container" id="projectDetailContainer">
        <!-- Динамично зареждане -->
    </main>

    <footer class="main-footer">
        <div class="footer-logo-area">
            <div>
                <div class="footer-brand">Academy Architect Studio</div>
                <div class="footer-subtext" data-key="footer-subtitle">Design & Engineering</div>
            </div>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-contacts">Contacts</h4>
            <p data-key="footer-address">Sofia, Bulgaria</p>
            <p><a href="mailto:office@architect-studio.bg">office@architect-studio.bg</a></p>
            <p>+359 88 123 4567</p>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-links-title">Links</h4>
            <p><a href="index.html" data-key="nav-home">Home</a></p>
            <p><a href="catalog.html" data-key="nav-catalog">Projects</a></p>
            <p><a href="about.html" data-key="nav-about">About Us</a></p>
        </div>
        
        <div class="footer-right">
            <p data-key="footer-rights">&copy; 2026 Academy Architect Studio.<br>All rights reserved.</p>
        </div>
    </footer>

    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
            
            const urlParams = new URLSearchParams(window.location.search);
            const projectIndex = urlParams.get('index');
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const container = document.getElementById('projectDetailContainer');
            const currentLang = localStorage.getItem('preferredLang') || 'en';
            const areaUnit = currentLang === 'en' ? 'sq.m' : 'кв.м';
            const backText = currentLang === 'en' ? '← Back to Projects' : '← Обратно към проектите';

            if (projectIndex !== null && projects[projectIndex]) {
                const p = projects[projectIndex];
                const mainImg = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';
                
                document.getElementById('pageTitle').textContent = `${p.title} | Academy Architect Studio`;

                let galleryHtml = '';
                let allImages = [];
                if (p.gallery && Array.isArray(p.gallery)) {
                    allImages = p.gallery;
                } else if (p.images && Array.isArray(p.images)) {
                    allImages = p.images;
                }

                if (allImages.length > 1) {
                    galleryHtml = `
                        <div class="gallery-grid">
                            ${allImages.map(img => `<div class="gallery-item"><img src="${img}" alt="Gallery image" onerror="this.src='https://placehold.co/600x400?text=Image'"></div>`).join('')}
                        </div>
                    `;
                }

                container.innerHTML = `
                    <a href="catalog.html" class="back-link">${backText}</a>
                    
                    <h1 class="project-title">${p.title}</h1>
                    <div class="project-meta-badges">
                        ${p.style ? `<span class="badge-item">${p.style}</span>` : ''}
                        ${p.area ? `<span class="badge-item">${p.area} ${areaUnit}</span>` : ''}
                    </div>

                    <img src="${mainImg}" alt="${p.title}" class="main-project-img" onerror="this.src='https://placehold.co/1000x600?text=Image'">

                    <div class="project-description">
                        <p>${p.description || p.desc || ''}</p>
                    </div>

                    ${galleryHtml}
                `;
            } else {
                container.innerHTML = `
                    <a href="catalog.html" class="back-link">${backText}</a>
                    <h2>Project not found.</h2>
                `;
            }
        });
    </script>
</body>
</html>
