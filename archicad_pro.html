<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>ARCHITECT 23 - FINISHED</title>
    <style>
        body { margin: 0; display: flex; height: 100vh; background: #ddd; font-family: sans-serif; overflow: hidden; }
        #toolbar { width: 60px; background: #eee; border-right: 2px solid #999; display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
        .tool { width: 45px; height: 45px; background: #fff; border: 2px solid #333; cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 24px; }
        #canvas { flex: 1; background: #fff; cursor: crosshair; }
        #view { flex: 1; perspective: 1000px; background: #000; position: relative; overflow: hidden; }
        .wall-3d { position: absolute; background: #bbb; border: 1px solid #777; height: 120px; transform-origin: left; }
    </style>
</head>
<body>

<div id="toolbar">
    <div class="tool">🧱</div>
</div>
<canvas id="canvas"></canvas>
<div id="view"></div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const view = document.getElementById('view');
    canvas.width = window.innerWidth / 2;
    canvas.height = window.innerHeight;

    let lastPos = { x: 200, y: 200 };

    canvas.addEventListener('mousedown', e => {
        const end = { x: e.offsetX, y: e.offsetY };
        const len = Math.sqrt((end.x - lastPos.x)**2 + (end.y - lastPos.y)**2);
        const angle = Math.atan2(end.y - lastPos.y, end.x - lastPos.x) * 180 / Math.PI;

        // 2D чертеж
        ctx.beginPath();
        ctx.moveTo(lastPos.x, lastPos.y);
        ctx.lineTo(end.x, end.y);
        ctx.lineWidth = 6;
        ctx.stroke();

        // 3D изглед
        const wall = document.createElement('div');
        wall.className = 'wall-3d';
        wall.style.width = len + 'px';
        wall.style.left = (lastPos.x / 2) + 'px';
        wall.style.top = (lastPos.y / 2 + 100) + 'px';
        wall.style.transform = `rotateY(${angle}deg)`;
        view.appendChild(wall);

        lastPos = end;
    });
</script>
</body>
</html>
