<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        body { background-color: var(--bg-color, #fbf9f4); color: var(--text-color, #1a1a1a); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-card { background: #fff; border: 1px solid #eadecc; width: 100%; max-width: 500px; padding: 40px; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); }
        
        .login-tabs { display: flex; border-bottom: 2px solid #eadecc; margin-bottom: 30px; }
        .login-tab { flex: 1; text-align: center; padding: 12px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; color: #8c8275; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .login-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8c8275; font-weight: 700; }
        .form-group input { padding: 12px; border: 1px solid #eadecc; background: #fff; font-size: 1rem; color: #1a1a1a; outline: none; width: 100%; box-sizing: border-box; border-radius: 8px; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        .btn-submit { background: #1a1a1a; color: #fff; padding: 15px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; margin-top: 10px; border-radius: 8px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn-submit:hover { background: #333; }

        .btn-admin-link { background: #8c8275; color: #fff; padding: 15px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; margin-top: 10px; border-radius: 8px; text-align: center; text-decoration: none; display: block; box-sizing: border-box; }
        .btn-admin-link:hover { background: #6e655a; }

        .btn-logout { background: #c0392b; color: #fff; padding: 15px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; margin-top: 15px; border-radius: 8px; }
        .btn-logout:hover { background: #a93226; }

        .switch-link { display: block; text-align: center; margin-top: 15px; color: #8c8275; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; }
        .switch-link:hover { color: #1a1a1a; }

        .back-link { display: block; text-align: center; margin-top: 25px; color: #8c8275; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; border-top: 1px solid #eadecc; padding-top: 20px; }
        .back-link:hover { color: #1a1a1a; }

        /* Профилен дизайн със ЗЕЛЕНА ТОЧКА */
        .profile-container { text-align: center; padding: 20px 0; }
        .profile-avatar-wrapper { position: relative; width: 90px; height: 90px; margin: 0 auto 20px auto; }
        .profile-avatar-icon { width: 100%; height: 100%; background: #e2e8f0; border-radius: 50%; display: flex; align-items: center; justify-content: center; color: #64748b; box-shadow: inset 0 2px 4px rgba(0,0,0,0.06); }
        .profile-avatar-icon svg { width: 50px; height: 50px; fill: currentColor; }
        
        /* Зелена светеща точка за статус онлайн */
        .notification-badge { position: absolute; top: 4px; right: 4px; width: 18px; height: 18px; background-color: #2ecc71; border: 3px solid #fff; border-radius: 50%; box-shadow: 0 0 8px rgba(46, 204, 113, 0.8); }

        .profile-email { font-size: 1.1rem; font-weight: 600; margin-bottom: 5px; color: inherit; word-break: break-all; }
        .profile-status { font-size: 0.85rem; color: #2ecc71; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 20px; font-weight: 700; display: flex; align-items: center; justify-content: center; gap: 6px; }

        /* Dark Mode Overrides */
        body.dark-mode { background-color: #121212 !important; color: #ffffff !important; }
        body.dark-mode .login-card { background: #1e1e1e !important; border-color: #2c2c2c !important; }
        body.dark-mode .login-tabs { border-bottom-color: #2c2c2c !important; }
        body.dark-mode .login-tab { color: #888 !important; }
        body.dark-mode .login-tab.active { color: #fff !important; border-bottom-color: #fff !important; }
        body.dark-mode .form-group input { background: #121212 !important; border-color: #444 !important; color: #ffffff !important; }
        body.dark-mode h2, body.dark-mode label { color: #ffffff !important; }
        body.dark-mode .btn-submit { background-color: #eadecc; color: #1a1a1a; }
        body.dark-mode .btn-submit:hover { background-color: #d4c8b6; }
        body.dark-mode .back-link { border-top-color: #2c2c2c !important; }
        body.dark-mode .profile-avatar-icon { background: #2a2a2a; color: #a0aec0; }
        body.dark-mode .notification-badge { border-color: #1e1e1e; }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Секция за влязъл потребител (видима само при активна сесия) -->
            <div id="loggedInView" style="display: none;">
                <div class="profile-container">
                    <div class="profile-avatar-wrapper">
                        <div class="profile-avatar-icon">
                            <svg viewBox="0 0 24 24">
                                <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                            </svg>
                        </div>
                        <div class="notification-badge" title="Онлайн"></div>
                    </div>
                    <div class="profile-status">● Влязъл в профила</div>
                    <div id="displayUserEmail" class="profile-email">name@example.com</div>
                    
                    <!-- Бутон за Админ (показва се само при администратор) -->
                    <a href="admin.html" id="adminPanelBtn" class="btn-admin-link" style="display: none;">⚙️ Към Админ Панела</a>

                    <button onclick="handleLogout()" class="btn-logout">Изход от системата</button>
                </div>
            </div>

            <!-- Секция за вход/регистрация -->
            <div id="loggedOutView">
                <div class="login-tabs">
                    <button class="login-tab active" onclick="switchLoginTab('userTab', this)">Потребител</button>
                    <button class="login-tab" onclick="switchLoginTab('adminTab', this)">Администратор</button>
                </div>

                <!-- ПОТРЕБИТЕЛСКИ ТАБ -->
                <div id="userTab" class="form-section active">
                    <div id="loginFormContainer">
                        <h2 style="font-weight: 400; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Вход за клиенти</h2>
                        <form onsubmit="handleUserLogin(event)">
                            <div class="form-group">
                                <label>Имейл</label>
                                <input type="email" id="userEmail" required placeholder="name@example.com">
                            </div>
                            <div class="form-group">
                                <label>Парола</label>
                                <input type="password" id="userPass" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn-submit">Влизане</button>
                        </form>
                        <a class="switch-link" onclick="toggleRegisterMode(true)">Нямате регистрация? Регистрация</a>
                    </div>

                    <div id="registerFormContainer" style="display: none;">
                        <h2 style="font-weight: 400; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Регистрация на нов профил</h2>
                        <form onsubmit="handleUserRegister(event)">
                            <div class="form-group">
                                <label>Име и фамилия</label>
                                <input type="text" id="regName" required placeholder="Иван Иванов">
                            </div>
                            <div class="form-group">
                                <label>Имейл</label>
                                <input type="email" id="regEmail" required placeholder="name@example.com">
                            </div>
                            <div class="form-group">
                                <label>Парола</label>
                                <input type="password" id="regPass" required placeholder="••••••••">
                            </div>
                            <button type="submit" class="btn-submit">Създай профил</button>
                        </form>
                        <a class="switch-link" onclick="toggleRegisterMode(false)">Вече имате профил? Вход</a>
                    </div>
                </div>

                <!-- АДМИН ТАБ -->
                <div id="adminTab" class="form-section">
                    <h2 style="font-weight: 400; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Вход за администратор</h2>
                    <form onsubmit="handleAdminLogin(event)">
                        <div class="form-group">
                            <label>Админ имейл</label>
                            <input type="email" id="adminEmail" required placeholder="admin@domain.com">
                        </div>
                        <div class="form-group">
                            <label>Админ парола</label>
                            <input type="password" id="adminPass" required placeholder="••••••••">
                        </div>
                        <button type="submit" class="btn-submit">Влизане в админ панел</button>
                    </form>
                </div>
            </div>

            <a href="index.html" class="back-link">← Назад към началната страница</a>
        </div>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            checkAuthStatus();
        });

        function checkAuthStatus() {
            const isLoggedIn = localStorage.getItem('isLoggedIn') === 'true';
            const userEmail = localStorage.getItem('loggedInUserEmail');
            const isAdmin = localStorage.getItem('isAdmin') === 'true';

            if (isLoggedIn && userEmail) {
                document.getElementById('loggedOutView').style.display = 'none';
                document.getElementById('loggedInView').style.display = 'block';
                document.getElementById('displayUserEmail').textContent = userEmail;

                const adminBtn = document.getElementById('adminPanelBtn');
                if (isAdmin) {
                    adminBtn.style.display = 'block';
                } else {
                    adminBtn.style.display = 'none';
                }
            } else {
                document.getElementById('loggedOutView').style.display = 'block';
                document.getElementById('loggedInView').style.display = 'none';
            }
        }

        function switchLoginTab(tabId, btnElement) {
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.login-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        function toggleRegisterMode(isRegister) {
            document.getElementById('loginFormContainer').style.display = isRegister ? 'none' : 'block';
            document.getElementById('registerFormContainer').style.display = isRegister ? 'block' : 'none';
        }

        function handleUserLogin(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value.trim().toLowerCase();
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loggedInUserEmail', email);
            localStorage.setItem('isAdmin', 'false');

            checkAuthStatus();
        }

        function handleUserRegister(e) {
            e.preventDefault();
            const email = document.getElementById('regEmail').value.trim().toLowerCase();
            
            localStorage.setItem('isLoggedIn', 'true');
            localStorage.setItem('loggedInUserEmail', email);
            localStorage.setItem('isAdmin', 'false');

            checkAuthStatus();
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value.trim().toLowerCase();
            const pass = document.getElementById('adminPass').value;

            // === ТВОИТЕ СИГУРНИ ДАННИ ЗА ВХОД ===
            const ADMIN_EMAIL = "admin@architect.bg";
            const ADMIN_PASS = "Arch#Studio2026!Secured"; // Сложна парола, защитена от случайно нацелване

            if (email === ADMIN_EMAIL && pass === ADMIN_PASS) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('loggedInUserEmail', email);
                localStorage.setItem('isAdmin', 'true');
                
                window.location.href = "admin.html";
            } else {
                alert("Грешен имейл или парола за администратор!");
            }
        }

        function handleLogout() {
            localStorage.removeItem('isLoggedIn');
            localStorage.removeItem('loggedInUserEmail');
            localStorage.removeItem('isAdmin');
            checkAuthStatus();
        }
    </script>
</body>
</html>
