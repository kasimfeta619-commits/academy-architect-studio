<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход / Регистрация | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .login-container {
            max-width: 400px;
            margin: 100px auto;
            padding: 40px;
            background: #fbf9f4;
            border: 1px solid #eadecc;
            box-shadow: 0 4px 10px rgba(0,0,0,0.02);
            text-align: center;
        }
        .login-container h2 {
            font-size: 1.5rem;
            font-weight: 400;
            margin-bottom: 30px;
            color: #1a1a1a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 20px;
            text-align: left;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #8c8275;
        }
        .form-group input {
            width: 100%;
            padding: 12px;
            border: 1px solid #eadecc;
            background: #fff;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group input:focus {
            outline: none;
            border-color: #8c8275;
        }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.3s;
        }
        .btn-submit:hover {
            background: #333;
        }
        .toggle-text {
            margin-top: 20px;
            font-size: 0.9rem;
            color: #555;
        }
        .toggle-text a {
            color: #8c8275;
            text-decoration: underline;
            cursor: pointer;
        }
        .message-box {
            font-size: 0.9rem;
            margin-top: 15px;
            display: none;
            font-weight: 600;
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <header class="navbar">
        <a href="index.html" class="logo-area">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
    </header>

    <!-- КОНТЕЙНЕР ЗА ВХОД / РЕГИСТРАЦИЯ -->
    <main>
        <div class="login-container">
            <h2 id="formTitle">Вход за Администратор</h2>
            <form id="authForm">
                <div class="form-group">
                    <label>Имейл</label>
                    <input type="email" id="email" required placeholder="kasim.feta@abv.bg">
                </div>
                <div class="form-group">
                    <label>Парола</label>
                    <input type="password" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">Влизане</button>
                
                <div class="message-box" id="messageBox"></div>
                
                <div class="toggle-text" id="toggleBlock">
                    Нямате профил? <a onclick="switchToRegister()">Регистрирайте се тук</a>
                </div>
            </form>
        </div>
    </main>

    <script>
        let isRegisterMode = false;

        function switchToRegister() {
            isRegisterMode = true;
            document.getElementById('formTitle').innerText = "Регистрация";
            document.getElementById('submitBtn').innerText = "Създай профил";
            document.getElementById('toggleBlock').innerHTML = 'Вече имате профил? <a onclick="switchToLogin()">Влезте оттук</a>';
            document.getElementById('messageBox').style.display = "none";
        }

        function switchToLogin() {
            isRegisterMode = false;
            document.getElementById('formTitle').innerText = "Вход за Администратор";
            document.getElementById('submitBtn').innerText = "Влизане";
            document.getElementById('toggleBlock').innerHTML = 'Нямате профил? <a onclick="switchToRegister()">Регистрирайте се тук</a>';
            document.getElementById('messageBox').style.display = "none";
        }

        document.getElementById('authForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const msgBox = document.getElementById('messageBox');

            if (isRegisterMode) {
                // --- РЕЖИМ: РЕГИСТРАЦИЯ ---
                // Записваме въведените от теб данни в паметта на браузъра
                localStorage.setItem('adminEmail', email);
                localStorage.setItem('adminPassword', password);
                
                msgBox.style.color = "green";
                msgBox.innerText = "Успешна регистрация! Сега можете да влезете.";
                msgBox.style.display = "block";
                
                // Автоматично те връща към екрана за Вход след 1.5 секунди
                setTimeout(switchToLogin, 1500);
            } else {
                // --- РЕЖИМ: ВХОД ---
                // Проверяваме какво има записано в паметта
                const savedEmail = localStorage.getItem('adminEmail');
                const savedPassword = localStorage.getItem('adminPassword');

                if (email === savedEmail && password === savedPassword) {
                    msgBox.style.color = "green";
                    msgBox.innerText = "Успешен вход! Пренасочване...";
                    msgBox.style.display = "block";
                    
                    // Пренасочване към твоя admin.html
                    setTimeout(() => {
                        window.location.href = "admin.html";
                    }, 1000);
                } else {
                    msgBox.style.color = "#b22222";
                    msgBox.innerText = "Грешен имейл или парола!";
                    msgBox.style.display = "block";
                }
            }
        });
    </script>
</body>
</html>
