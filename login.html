<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio" data-key="nav-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="estimator.html" data-key="nav-estimator">Estimator</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark</button>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="booking.html" class="btn-login" style="margin-left: 10px;" data-key="nav-booking">Booking</a>
            <a href="login.html" class="btn-login active" data-key="nav-login">Login</a>
        </div>
    </nav>

    <!-- ФОРМА ЗА ВХОД (ЗА АДМИН И ПОТРЕБИТЕЛИ) -->
    <main style="padding: 60px 8%; display: flex; justify-content: center; align-items: center;">
        <div style="background-color: #fdfbf7; border: 1px solid #e6dec9; padding: 40px; width: 100%; max-width: 450px; box-sizing: border-box;">
            <h2 style="text-align: center; font-size: 1.4rem; letter-spacing: 1px; margin-bottom: 30px; font-weight: normal; line-height: 1.4; color: #1a1a1a;">
                ВХОД В СИСТЕМАТА
            </h2>
            
            <form id="loginForm" style="display: flex; flex-direction: column; gap: 20px;">
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 1px; color: #665c52;">ИМЕЙЛ</label>
                    <input type="email" id="loginEmail" placeholder="e-mail" required style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #dcd6c8; background: #fff; border-radius: 0;">
                </div>
                <div>
                    <label style="display: block; margin-bottom: 8px; font-size: 0.8rem; letter-spacing: 1px; color: #665c52;">ПАРОЛА</label>
                    <input type="password" id="loginPassword" placeholder="•••••••" required style="width: 100%; padding: 12px; box-sizing: border-box; border: 1px solid #dcd6c8; background: #fff; border-radius: 0;">
                </div>
                <button type="submit" style="width: 100%; padding: 14px; background-color: #1a1a1a; color: #fff; border: none; font-weight: bold; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; margin-top: 10px;">ВЛИЗАНЕ</button>
            </form>
            
            <div style="text-align: center; margin-top: 25px; font-size: 0.85rem; color: #736b5e;">
                Нямате профил? <a href="register.html" style="color: #1a1a1a; text-decoration: underline;">Регистрирайте се тук</a>
            </div>
        </div>
    </main>

    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;

            // 1. ТВОЯТ АДМИНСКИ ИМЕЙЛ (Замени го с твоя личен имейл, с който ще влизаш като админ)
            const adminEmail = "admin@architect-studio.bg"; 

            if (email === adminEmail) {
                // Вход като АДМИН
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true');
                localStorage.setItem('admin', 'true');
                localStorage.setItem('userEmail', email);
                window.location.href = 'admin.html';
                return;
            }

            // 2. ВХОД ЗА ОБИКНОВЕН ПОТРЕБИТЕЛ (Проверява в списъка с регистрирани потребители)
            let users = JSON.parse(localStorage.getItem('studioUsers') || '[]');
            let foundUser = users.find(u => u.email === email && u.password === password);

            if (foundUser) {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('userEmail', foundUser.email);
                localStorage.setItem('userName', foundUser.name);
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('admin');

                // Пращаме потребителя директно към страницата за запитване
                window.location.href = 'booking.html';
            } else {
                alert('Грешен имейл или парола, или потребителят не е регистриран!');
            }
        });
    </script>
</body>
</html>
