<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <!-- Скрипт за мигновено зареждане на темата без премигване -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();
    </script>
    <style>
        body { background-color: var(--bg-color, #fbf9f4); color: var(--text-color, #1a1a1a); font-family: sans-serif; margin: 0; display: flex; flex-direction: column; min-height: 100vh; transition: background-color 0.3s, color 0.3s; }
        .login-wrapper { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px; }
        .login-card { background: #fff; border: 1px solid #eadecc; width: 100%; max-width: 500px; padding: 40px; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s; }
        
        .login-tabs { display: flex; border-bottom: 2px solid #eadecc; margin-bottom: 30px; }
        .login-tab { flex: 1; text-align: center; padding: 12px; font-size: 0.85rem; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; color: #8c8275; background: none; border: none; border-bottom: 2px solid transparent; margin-bottom: -2px; transition: all 0.2s; }
        .login-tab.active { color: #1a1a1a; border-bottom-color: #1a1a1a; }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8c8275; font-weight: 700; }
        .form-group input { padding: 12px; border: 1px solid #eadecc; background: #fff; font-size: 1rem; color: #1a1a1a; outline: none; width: 100%; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; }
        
        .btn-submit { background: #1a1a1a; color: #fff; padding: 15px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; margin-top: 10px; }
        .btn-submit:hover { background: #333; }

        .back-link { display: block; text-align: center; margin-top: 20px; color: #8c8275; text-decoration: none; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; }
        .back-link:hover { color: #1a1a1a; }

        /* Dark Mode Overrides */
        body.dark-mode {
            background-color: #121212 !important;
            color: #ffffff !important;
        }
        body.dark-mode .login-card {
            background: #1e1e1e !important;
            border-color: #2c2c2c !important;
        }
        body.dark-mode .login-tabs {
            border-bottom-color: #2c2c2c !important;
        }
        body.dark-mode .login-tab {
            color: #888 !important;
        }
        body.dark-mode .login-tab.active {
            color: #fff !important;
            border-bottom-color: #fff !important;
        }
        body.dark-mode .form-group input {
            background: #121212 !important;
            border-color: #444 !important;
            color: #ffffff !important;
        }
        body.dark-mode h2, body.dark-mode label {
            color: #ffffff !important;
        }
        body.dark-mode .btn-submit {
            background-color: #eadecc;
            color: #1a1a1a;
        }
        body.dark-mode .btn-submit:hover {
            background-color: #d4c8b6;
        }
    </style>
</head>
<body>

    <div class="login-wrapper">
        <div class="login-card">
            
            <!-- Табове за превключване -->
            <div class="login-tabs">
                <button class="login-tab active" onclick="switchLoginTab('userTab', this)">Потребител</button>
                <button class="login-tab" onclick="switchLoginTab('adminTab', this)">Администратор</button>
            </div>

            <!-- ПОТРЕБИТЕЛСКИ ВХОД -->
            <div id="userTab" class="form-section active">
                <h2 style="font-weight: 400; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Вход за клиенти</h2>
                <form onsubmit="handleUserLogin(event)">
                    <div class="form-group">
                        <label>Имейл</label>
                        <input type="email" required placeholder="name@example.com">
                    </div>
                    <div class="form-group">
                        <label>Парола</label>
                        <input type="password" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-submit">Влизане</button>
                </form>
            </div>

            <!-- АДМИНСКИ ВХОД -->
            <div id="adminTab" class="form-section">
                <h2 style="font-weight: 400; font-size: 1.5rem; margin-bottom: 25px; text-align: center;">Вход за администратор</h2>
                <form onsubmit="handleAdminLogin(event)">
                    <div class="form-group">
                        <label>Админ имейл</label>
                        <input type="email" id="adminEmail" required placeholder="admin@domain.com">
                    </div>
                    <div class="form-group">
                        <label>Админ парола</label>
                        <input type="password" id="adminPass" required placeholder="••••••••">
                    </div>
                    <button type="submit" class="btn-submit">Влизане в админ панел</button>
                </form>
            </div>

            <a href="index.html" class="back-link">← Назад към началната страница</a>
        </div>
    </div>

    <script>
        function switchLoginTab(tabId, btnElement) {
            document.querySelectorAll('.form-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.login-tab').forEach(tab => {
                tab.classList.remove('active');
            });

            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
        }

        function handleUserLogin(e) {
            e.preventDefault();
            alert("Успешен вход!");
            window.location.href = "index.html";
        }

        function handleAdminLogin(e) {
            e.preventDefault();
            const email = document.getElementById('adminEmail').value;
            const pass = document.getElementById('adminPass').value;

            // Тук задаваш реалните данни за вход, които само ти ще знаеш
            if (email === "admin@architect.bg" && pass === "admin123") {
                localStorage.setItem('isAdminAuthenticated', 'true');
                window.location.href = "admin.html";
            } else {
                alert("Грешен имейл или парола за администратор!");
            }
        }
    </script>
</body>
</html>
