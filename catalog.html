<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Каталог | Academy Architect Studio</title>
    <style>
        body { margin: 0; padding: 0; background-color: #fbf9f4; font-family: sans-serif; }
        
        /* Ключовата поправка: тук определяме ширината на целия каталог */
        .catalog-container {
            max-width: 1200px; 
            margin: 0 auto;
            padding: 60px 20px;
        }

        .catalog-grid {
            display: grid;
            /* Това прави колоните автоматични, но не позволява да са твърде малки */
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 30px;
        }

        .project-card {
            background: #fff;
            border: 1px solid #eadecc;
            cursor: pointer;
            transition: transform 0.3s ease;
            display: flex;
            flex-direction: column;
        }
        
        .project-card:hover { transform: translateY(-5px); }

        .project-image-wrapper {
            width: 100%;
            height: 200px; /* Фиксирана височина за еднаквост */
            overflow: hidden;
        }

        .project-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* Снимката запълва пространството без да се деформира */
        }

        .project-info { padding: 20px; }
        .project-info h3 { margin: 0 0 10px 0; font-size: 1.2rem; }
    </style>
</head>
<body>

    <main class="catalog-container">
        <h1>Каталог с проекти</h1>
        <div class="catalog-grid" id="catalogGrid">
            <!-- Тук влизат проектите -->
        </div>
    </main>

    <script>
        function renderProjects() {
            const grid = document.getElementById('catalogGrid');
            const projects = JSON.parse(localStorage.getItem('myProjects')) || [];

            if (projects.length === 0) {
                grid.innerHTML = '<p>Няма добавени проекти.</p>';
                return;
            }

            grid.innerHTML = projects.map((p, index) => {
                const imgSrc = p.image || (p.gallery && p.gallery[0] ? p.gallery[0] : '');
                return `
                <div class="project-card" onclick="window.location.href='project.html?id=${index}'">
                    <div class="project-image-wrapper">
                        <img src="${imgSrc}" alt="${p.title}">
                    </div>
                    <div class="project-info">
                        <h3>${p.title}</h3>
                        <p>${p.description ? p.description.substring(0, 50) + '...' : ''}</p>
                    </div>
                </div>`;
            }).reverse().join('');
        }
        renderProjects();
    </script>
</body>
</html>
