<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Catalog | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo-area" style="text-decoration:none; color:#1a1a1a;">
            <img src="assets/logo.png" alt="Logo" class="logo-icon">
            <span>Academy Architect Studio</span>
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="catalog.html" class="active">Catalog</a>
            <a href="about.html">About</a>
            <a href="contact.html">Contact</a>
        </nav>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
            <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
        </div>
    </header>
    <main class="content-wrapper">
        <h1 id="cat-title">House Project Catalog</h1>
    </main>
    <script>
        function setLanguage(lang) {
            document.getElementById('cat-title').innerText = (lang === 'en') ? "House Project Catalog" : "Каталог с проекти";
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
