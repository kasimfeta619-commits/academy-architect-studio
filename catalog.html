<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог с проекти | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        body { background-color: #fbf9f4; color: #1a1a1a; font-family: sans-serif; margin: 0; }
        .catalog-container { padding: 60px 10%; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 40px; margin-top: 40px; }
        .project-card { background: #fff; border: 1px solid #eadecc; cursor: pointer; transition: transform 0.2s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-card img { width: 100%; height: 260px; object-fit: cover; display: block; }
        .project-info { padding: 25px; }
        .project-style { font-size: 0.65rem; text-transform: uppercase; color: #8c8275; font-weight: 700; letter-spacing: 1.5px; }
        .project-title { font-size: 1.25rem; font-weight: 500; margin: 8px 0 15px 0; color: #1a1a1a; }
        .project-meta { display: flex; justify-content: space-between; border-top: 1px solid #f0ece1; padding-top: 15px; font-size: 0.9rem; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo-area" style="display: flex; align-items: center; gap: 12px; text-decoration: none;">
            <img src="assets/main-graphic.png" alt="Logo" class="logo-icon" style="height: 38px; width: auto; display: block;" onerror="this.style.display='none'">
            <span style="font-weight: 500; color: #1a1a1a; font-size: 1.1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
        </a>
        <nav id="nav-links">
            <a href="index.html">Начало</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="about.html">За нас</a>
            <a href="planner.html">ИИ Планер</a>
            <a href="contact.html">Контакт</a>
        </nav>
        <div class="header-actions">
            <a href="login.html" class="btn-login">Вход</a>
        </div>
    </header>

    <main class="catalog-container">
        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8c8275; font-weight: 700;">АРХИВ</span>
        <h1 style="font-size: 2.5rem; font-weight: 400; margin-top: 5px; color: #1a1a1a;">Каталог с проекти</h1>
        
        <div id="catalogGrid" class="catalog-grid"></div>
    </main>

    <footer class="main-footer">
        <div class="footer-logo-area" style="display: flex; align-items: center; gap: 12px;">
            <img src="assets/main-graphic.png" alt="Logo" class="footer-logo" style="height: 32px; width: auto;" onerror="this.style.display='none'">
            <div>
                <span class="footer-brand" style="font-weight: 600; color: #1a1a1a; font-size: 1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
                <p class="footer-subtext" style="font-size: 0.65rem; letter-spacing: 1px; color: #8c8275; margin-top: 2px;">АРХИТЕКТУРНО СТУДИО</p>
            </div>
        </div>
        <div class="footer-col">
            <h4 style="font-size: 0.85rem; letter-spacing: 1px; margin-bottom: 10px; color: #1a1a1a;">STUDIO</h4>
            <p style="font-size: 0.85rem; color: #555; margin: 4px 0;">Sofia · Plovdiv · Varna</p>
            <p style="font-size: 0.85rem; margin: 4px 0;"><a href="mailto:info@architectstudio.com" style="color: #555; text-decoration: none;">info@architectstudio.com</a></p>
        </div>
        <div class="footer-col footer-right" style="text-align: right; color: #8c8275; font-size: 0.85rem;">
            <p>© 2026</p>
            <p>Academy Architect Studio — Всички права запазени.</p>
        </div>
    </footer>

    <script>
        const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
        const grid = document.getElementById('catalogGrid');

        if (projects.length === 0) {
            grid.innerHTML = `<p style="color: #8c8275; grid-column: 1/-1;">Все още няма качени проекти в каталога.</p>`;
        } else {
            grid.innerHTML = projects.map((p, index) => {
                const cardImage = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';

                return `
                    <div class="project-card" onclick="window.location.href='project.html?index=${index}'">
                        <img src="${cardImage}" alt="${p.title}">
                        <div class="project-info">
                            <span class="project-style">${p.style || 'Архитектурен проект'}</span>
                            <h3 class="project-title">${p.title}</h3>
                            <div class="project-meta">
                                <span style="color: #555;">${p.area ? p.area + ' кв.м' : '-'}</span>
                                <span style="font-weight: 600; color: #1a1a1a;">${p.price ? p.price + ' лв.' : 'По запитване'}</span>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }
    </script>
</body>
</html>
