<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Каталог | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Модерна минималистична решетка за проектите */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 40px;
            margin-top: 40px;
        }

        .project-card {
            background: #fff;
            border: 1px solid #eadecc;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            transition: transform 0.3s ease;
        }

        .project-card:hover {
            transform: translateY(-5px);
        }

        .project-image-wrapper {
            width: 100%;
            height: 250px;
            overflow: hidden;
            background: #eee;
        }

        .project-image-wrapper img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .project-info {
            padding: 25px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .project-info h3 {
            font-size: 1.3rem;
            font-weight: 500;
            color: #1a1a1a;
            margin: 0;
        }

        .project-info p {
            font-size: 0.95rem;
            color: #555;
            line-height: 1.6;
            margin: 0;
        }

        .project-date {
            font-size: 0.75rem;
            color: #8c8275;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .no-projects {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 0;
            color: #8c8275;
            font-style: italic;
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <header class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://placehold.co/150x50?text=Logo'">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
        <nav id="nav-links">
            <a href="index.html" data-key="nav-home">Начало</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Каталог</a>
            <a href="about.html" data-key="nav-about">За нас</a>
            <a href="planner.html" data-key="nav-planner">ИИ Планер</a>
            <a href="contact.html" data-key="nav-contact">Контакт</a>
        </nav>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn active" onclick="changeLanguage('bg')">BG</button>
            </div>
            <a href="login.html" class="btn-login" id="btn-login">Вход</a>
        </div>
    </header>

    <!-- ОСНОВНО СЪДЪРЖАНИЕ -->
    <main class="content-container" style="padding: 60px 10%; background-color: #fbf9f4; min-height: 70vh;">
        <span class="eyebrow" id="page-eyebrow">АРХИВ</span>
        <h1 id="page-title">Каталог с проекти</h1>

        <!-- Динамична решетка, в която се зареждат проектите -->
        <div class="catalog-grid" id="catalogGrid">
            <!-- Проектите ще се генерират автоматично тук чрез JavaScript -->
        </div>
    </main>

    <!-- ФУТЪР -->
    <footer class="main-footer">
        <div class="footer-logo-area">
            <img src="assets/logo.png" alt="Logo" class="footer-logo" onerror="this.style.display='none'">
            <div>
                <span class="footer-brand">Academy Architect <span class="logo-studio">Studio</span></span>
                <p class="footer-subtext" id="footer-subtext">АРХИТЕКТУРНО СТУДИО</p>
            </div>
        </div>
        <div class="footer-col">
            <h4>STUDIO</h4>
            <p>Sofia · Plovdiv · Varna</p>
            <p><a href="mailto:info@architectstudio.com">info@architectstudio.com</a></p>
        </div>
        <div class="footer-col footer-right">
            <p>© 2026</p>
            <p id="footer-rights">Academy Architect Studio — Всички права запазени.</p>
        </div>
    </footer>

    <!-- СКРИПТ ЗА ДИНАМИЧНО ЗАРЕЖДАНЕ И ПРЕВОД -->
    <script>
        // Сигурна функция с "onclick" за пренасочване към детайлите на проекта
        function renderProjects() {
            const grid = document.getElementById('catalogGrid');
            const savedProjects = JSON.parse(localStorage.getItem('myProjects')) || [];

            if (savedProjects.length === 0) {
                grid.innerHTML = '<div class="no-projects">Все още няма добавени проекти в каталога. Влезте в админ панела, за да качите първия си проект!</div>';
                return;
            }

            // Тук използваме директно кликане върху картата (onclick) за максимална съвместимост
            grid.innerHTML = savedProjects.map((project, index) => `
                <div class="project-card" onclick="window.location.href='project.html?id=${index}'" style="cursor: pointer;">
                    <div class="project-image-wrapper">
                        <img src="${project.image}" alt="${project.title}">
                    </div>
                    <div class="project-info">
                        <span class="project-date">${project.date || 'Проект'}</span>
                        <h3>${project.title}</h3>
                        <p>${project.description}</p>
                    </div>
                </div>
            `).reverse().join('');
        }

        // Стартиране на рендерирането при зареждане на страницата
        window.onload = function() {
            renderProjects();
        };

        // Логика за чужди езици
        const translations = {
            en: {
                "nav-home": "Home", "nav-about": "About", "nav-planner": "AI Planner", "nav-contact": "Contact", "btn-login": "Login",
                "page-eyebrow": "ARCHIVE", "page-title": "Project Catalog",
                "footer-subtext": "ARCHITECTURAL DESIGN STUDIO", "footer-rights": "Academy Architect Studio — All rights reserved."
            },
            bg: {
                "nav-home": "Начало", "nav-catalog": "Каталог", "nav-about": "За нас", "nav-planner": "ИИ Планер", "nav-contact": "Контакт", "btn-login": "Вход",
                "page-eyebrow": "АРХИВ", "page-title": "Каталог с проекти",
                "footer-subtext": "АРХИТЕКТУРНО СТУДИО", "footer-rights": "Academy Architect Studio — Всички права запазени."
            }
        };

        function changeLanguage(lang) {
            document.querySelectorAll('#nav-links a').forEach(link => {
                const key = link.getAttribute('data-key');
                if (translations[lang][key]) link.innerText = translations[lang][key];
            });

            const catalogLink = document.querySelector('#nav-links a[data-key="nav-catalog"]');
            if (catalogLink) {
                catalogLink.style.display = (lang === 'en') ? 'none' : 'inline-block';
            }

            const keysToTranslate = ['btn-login', 'page-eyebrow', 'page-title', 'footer-subtext', 'footer-rights'];
            keysToTranslate.forEach(id => {
                const el = document.getElementById(id);
                if (el && translations[lang][id]) el.innerText = translations[lang][id];
            });

            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            if(event && event.target) event.target.classList.add('active');
        }
    </script>
</body>
</html>
