<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="planner.html" data-key="nav-planner">AI Planner</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="login.html" class="btn-login" data-key="nav-login">Login</a>
        </div>
    </nav>

    <!-- КАТАЛОГ СЪДЪРЖАНИЕ -->
    <main style="padding: 60px 10%; min-height: 70vh;">
        <h1 data-key="catalog-title" style="font-size: 2rem; font-weight: 400; margin-bottom: 40px; color: #1a1a1a;">Our Projects</h1>
        
        <div id="catalogProjectsGrid" class="projects-grid">
            <!-- Динамично зареждане на всички проекти -->
        </div>
    </main>

    <!-- ФУТЪР -->
    <footer class="main-footer">
        <div class="footer-logo-area">
            <div>
                <div class="footer-brand">Academy Architect Studio</div>
                <div class="footer-subtext" data-key="footer-subtitle">Design & Engineering</div>
            </div>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-contacts">Contacts</h4>
            <p data-key="footer-address">Sofia, Bulgaria</p>
            <p><a href="mailto:office@architect-studio.bg">office@architect-studio.bg</a></p>
            <p>+359 88 123 4567</p>
        </div>
        
        <div class="footer-col">
            <h4 data-key="footer-links-title">Links</h4>
            <p><a href="index.html" data-key="nav-home">Home</a></p>
            <p><a href="catalog.html" data-key="nav-catalog">Projects</a></p>
            <p><a href="about.html" data-key="nav-about">About Us</a></p>
        </div>
        
        <div class="footer-right">
            <p data-key="footer-rights">&copy; 2026 Academy Architect Studio.<br>All rights reserved.</p>
        </div>
    </footer>

    <!-- СКРИПТОВЕ -->
    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();

            const container = document.getElementById('catalogProjectsGrid');
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const currentLang = localStorage.getItem('siteLang') || 'en';

            if (projects.length > 0) {
                container.innerHTML = projects.map((p, index) => {
                    const imgSrc = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';
                    const areaUnit = currentLang === 'en' ? 'sq.m' : 'кв.м';

                    return `
                        <a href="project-detail.html?index=${index}" class="project-card">
                            <div class="project-img-box">
                                <img src="${imgSrc}" alt="${p.title}" onerror="this.src='https://placehold.co/600x400?text=Image'">
                            </div>
                            <div class="project-info">
                                <span class="p-title">${p.title}</span>
                                <span class="p-meta">${p.style || (currentLang === 'en' ? 'Architectural Project' : 'Архитектурен проект')}</span>
                                <span class="p-area">${p.area ? p.area + ' ' + areaUnit : '-'}</span>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                container.innerHTML = `<p style="color: #8c8275; font-size: 0.95rem; grid-column: 1 / -1;" data-key="no-projects">No projects added yet.</p>`;
                applyTranslations(currentLang);
            }
        });
    </script>
</body>
</html>
