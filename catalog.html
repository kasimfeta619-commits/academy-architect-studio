<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Каталог | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Добавяме това тук, за да сме сигурни, че дизайнът се запазва */
        .catalog-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 40px;
            padding: 40px 10%;
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <header class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://placehold.co/150x50?text=Logo'">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
        <nav id="nav-links">
            <a href="index.html">Начало</a>
            <a href="catalog.html" class="active">Каталог</a>
            <a href="about.html">За нас</a>
            <a href="planner.html">ИИ Планер</a>
            <a href="contact.html">Контакт</a>
        </nav>
        <div class="header-actions">
            <a href="login.html" class="btn-login">Вход</a>
        </div>
    </header>

    <!-- СЪДЪРЖАНИЕ -->
    <main class="content-container" style="background-color: #fbf9f4; min-height: 70vh;">
        <span class="eyebrow" style="padding: 40px 10% 0 10%; display:block;">АРХИВ</span>
        <h1 style="padding: 0 10%;">Каталог с проекти</h1>

        <div class="catalog-grid" id="catalogGrid">
            <!-- Тук проектите ще се появят автоматично -->
        </div>
    </main>

    <!-- ФУТЪР -->
    <footer class="main-footer">
        <div class="footer-logo-area">
            <span class="footer-brand">Academy Architect <span class="logo-studio">Studio</span></span>
            <p class="footer-subtext">АРХИТЕКТУРНО СТУДИО</p>
        </div>
        <div class="footer-col">
            <h4>STUDIO</h4>
            <p>Sofia · Plovdiv · Varna</p>
            <p>info@architectstudio.com</p>
        </div>
        <div class="footer-col footer-right">
            <p>© 2026</p>
            <p>Academy Architect Studio — Всички права запазени.</p>
        </div>
    </footer>

    <script>
        function renderProjects() {
            const grid = document.getElementById('catalogGrid');
            const projects = JSON.parse(localStorage.getItem('myProjects')) || [];

            grid.innerHTML = projects.map((p, index) => {
                const imgSrc = p.image || (p.gallery && p.gallery[0] ? p.gallery[0] : '');
                return `
                <div class="project-card" onclick="window.location.href='project.html?id=${index}'" style="cursor:pointer; background:#fff; border:1px solid #eadecc;">
                    <div class="project-image-wrapper" style="height:250px; overflow:hidden;">
                        <img src="${imgSrc}" style="width:100%; height:100%; object-fit:cover;">
                    </div>
                    <div class="project-info" style="padding:20px;">
                        <span style="font-size:0.7rem; color:#8c8275;">ПРОЕКТ</span>
                        <h3>${p.title}</h3>
                        <p>${p.description ? p.description.substring(0, 50) + '...' : ''}</p>
                    </div>
                </div>`;
            }).reverse().join('');
        }
        renderProjects();
    </script>
</body>
</html>
