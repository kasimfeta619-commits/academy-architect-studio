<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio" data-key="nav-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Projects</a>
            <a href="about.html" data-key="nav-about">About Us</a>
            <a href="planner.html" data-key="nav-planner">AI Planner</a>
            <a href="estimator.html" data-key="nav-estimator">Estimator</a>
            <a href="contact.html" data-key="nav-contact">Contacts</a>
        </div>

        <div class="header-actions">
            <button id="darkModeBtn" onclick="toggleDarkMode()">🌙 Dark</button>
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="login.html" class="btn-login" data-key="nav-login">Login</a>
        </div>
    </nav>

    <main style="padding: 60px 8%; max-width: 1200px; margin: 0 auto;">
        <h1 data-key="nav-catalog" style="font-size: 2.5rem; margin-bottom: 30px;">Projects</h1>
        <div class="projects-grid" id="catalogProjectsContainer"></div>
    </main>

    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
            const container = document.getElementById('catalogProjectsContainer');
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const currentLang = localStorage.getItem('siteLang') || 'en';
            const areaUnit = currentLang === 'en' ? 'sq.m' : 'кв.м';

            if (projects.length > 0) {
                container.innerHTML = projects.map((p, index) => {
                    const imgSrc = p.mainImage || (p.gallery && p.gallery[0]) || 'assets/main-graphic.png';
                    return `
                        <a href="project-detail.html?index=${index}" class="project-card">
                            <div class="project-img-box">
                                <img src="${imgSrc}" alt="${p.title}" onerror="this.src='https://placehold.co/600x400?text=Image'">
                            </div>
                            <div class="project-info">
                                <span class="p-title">${p.title}</span>
                                <span class="p-meta">${p.style || (currentLang === 'en' ? 'Architectural Project' : 'Архитектурен проект')}</span>
                                <span class="p-area">${p.area ? p.area + ' ' + areaUnit : '-'}</span>
                            </div>
                        </a>
                    `;
                }).join('');
            } else {
                container.innerHTML = `<p style="color: #8c8275; font-size: 0.95rem;" data-key="no-projects">No projects added yet.</p>`;
                applyTranslations(currentLang);
            }
        });
    </script>
</body>
</html>
