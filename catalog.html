<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Catalog | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .filters-container { display: flex; gap: 15px; background: #fff; padding: 20px; border: 1px solid #e3dac9; border-radius: 4px; margin-bottom: 20px; font-size: 0.8rem; flex-wrap: wrap; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { text-transform: uppercase; color: #8c8275; font-weight: 600; font-size: 0.7rem; letter-spacing: 1px; }
        .filter-group select, .filter-group input { padding: 10px; border: 1px solid #ccc; background: #fff; border-radius: 4px; min-width: 120px; }
        .area-inputs { display: flex; gap: 5px; }
        .area-inputs input { width: 70px; min-width: unset; }
        .btn-reset { padding: 10px 20px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 4px; height: 38px; }

        .quick-add-panel { background: #eadecc; padding: 20px; border-radius: 4px; margin-bottom: 30px; border: 1px solid #b5ab9e; }
        .quick-add-panel h3 { margin-bottom: 15px; font-size: 1rem; font-weight: 500; color: #1a1a1a; }
        .admin-form { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .admin-form input, .admin-form button { padding: 10px; border: 1px solid #b5ab9e; border-radius: 4px; font-size: 0.85rem; }
        .admin-form button { background: #1a1a1a; color: #fff; cursor: pointer; grid-column: span 4; font-weight: bold; border: none; margin-top: 5px; }

        .projects-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 30px; margin-top: 30px; }
        .project-card { background: transparent; }
        .project-img-box { width: 100%; height: 260px; background: #ebd9c5; border-radius: 4px; overflow: hidden; display: flex; align-items: center; justify-content: center; border: 1px solid #e3dac9; }
        .project-img-box img { width: 100%; height: 100%; object-fit: cover; }
        .project-info { margin-top: 15px; }
        .project-title { font-size: 1.1rem; font-weight: 500; margin-bottom: 10px; color: #1a1a1a; }
        .project-specs { display: flex; gap: 20px; font-size: 0.7rem; color: #8c8275; text-transform: uppercase; letter-spacing: 0.5px; }
        .spec-item span { display: block; color: #1a1a1a; font-weight: bold; font-size: 0.85rem; margin-top: 2px; }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://placehold.co/150x50?text=Logo'">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
        <nav id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" class="active" data-key="nav-catalog">Catalog</a>
        </nav>
    </header>

    <main class="content-container">
        <span class="eyebrow">CATALOG</span>
        <h1 id="cat-title">House Project Catalog</h1>
        
        <div class="filters-container">
            <div class="filter-group"><label>Type</label><select><option>Any</option></select></div>
            <div class="filter-group">
                <label>Area (m²)</label>
                <div class="area-inputs"><input type="number" placeholder="min"><input type="number" placeholder="max"></div>
            </div>
            <div class="filter-group"><label>Floors</label><select><option>Any</option><option>1</option><option>2</option></select></div>
            <div class="filter-group"><label>Bedrooms</label><select><option>Any</option><option>1</option><option>2</option><option>3</option></select></div>
            <button class="btn-reset">Reset filters</button>
        </div>

        <div class="quick-add-panel">
            <h3>Добави нов проект в сайта</h3>
            <div class="admin-form">
                <input type="text" id="new-title" placeholder="Име на проекта">
                <input type="text" id="new-img" placeholder="Линк или път до снимка">
                <input type="number" id="new-area" placeholder="Квадратура">
                <input type="number" id="new-floors" placeholder="Етажи">
                <input type="number" id="new-beds" placeholder="Спални">
                <input type="number" id="new-baths" placeholder="Бани">
                <button onclick="addNewProject()">Добави проекта веднага</button>
            </div>
        </div>

        <p style="font-size: 0.85rem; color: #8c8275;"><span id="count-num">0</span> проекти</p>
        <div class="projects-grid" id="projectsGrid"></div>
    </main>

    <script>
        // Тук сложих работещи линкове от интернет, за да видиш снимки ВЕДНАГА, дори без папка assets!
        const defaultProjects = [
            { title: "MinimalistHouse", img: "https://images.unsplash.com/photo-1600585154340-be6161a56a0c?auto=format&fit=crop&w=600&q=80", area: 175, floors: 2, beds: 4, baths: 2 },
            { title: "Alpine Complex Edelweiss", img: "https://images.unsplash.com/photo-1513694203232-719a280e022f?auto=format&fit=crop&w=600&q=80", area: 280, floors: 2, beds: 5, baths: 2 },
            { title: "SlimHouse 95", img: "https://images.unsplash.com/photo-1580587771525-78b9dba3b914?auto=format&fit=crop&w=600&q=80", area: 95, floors: 2, beds: 2, baths: 2 }
        ];

        let projects = JSON.parse(localStorage.getItem('myProjects')) || defaultProjects;

        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';
            projects.forEach(p => {
                grid.innerHTML += `
                    <div class="project-card">
                        <div class="project-img-box">
                            <img src="${p.img}" alt="${p.title}" onerror="this.src='https://placehold.co/400x260?text=No+Image'">
                        </div>
                        <div class="project-info">
                            <div class="project-title">${p.title}</div>
                            <div class="project-specs">
                                <div class="spec-item">M² <span>${p.area}</span></div>
                                <div class="spec-item">Floors <span>${p.floors}</span></div>
                                <div class="spec-item">Beds <span>${p.beds}</span></div>
                                <div class="spec-item">Baths <span>${p.baths}</span></div>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('count-num').innerText = projects.length;
        }

        function addNewProject() {
            const title = document.getElementById('new-title').value;
            const img = document.getElementById('new-img').value;
            const area = document.getElementById('new-area').value;
            const floors = document.getElementById('new-floors').value;
            const beds = document.getElementById('new-beds').value;
            const baths = document.getElementById('new-baths').value;

            if(!title || !img) { alert('Моля, въведете име и снимка!'); return; }

            projects.push({ title, img, area: parseInt(area)||0, floors: parseInt(floors)||1, beds: parseInt(beds)||1, baths: parseInt(baths)||1 });
            localStorage.setItem('myProjects', JSON.stringify(projects));
            renderProjects();
        }

        renderProjects();
    </script>
</body>
</html>
