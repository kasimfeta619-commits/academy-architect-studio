<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Каталог | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); gap: 40px; padding: 60px 10%; }
        .project-card { background: #fff; border: 1px solid #eadecc; cursor: pointer; transition: 0.3s; }
        .project-card:hover { transform: translateY(-5px); }
        .project-image-wrapper { width: 100%; height: 250px; background: #eee; overflow: hidden; }
        .project-image-wrapper img { width: 100%; height: 100%; object-fit: cover; }
        .project-info { padding: 25px; }
    </style>
</head>
<body>

    <main class="content-container" style="background-color: #fbf9f4; min-height: 80vh;">
        <div class="catalog-grid" id="catalogGrid"></div>
    </main>

    <script>
        function renderProjects() {
            const grid = document.getElementById('catalogGrid');
            const projects = JSON.parse(localStorage.getItem('myProjects')) || [];

            grid.innerHTML = projects.map((p, index) => {
                // Тук е поправката: ако няма 'image', търси в 'gallery[0]'
                const imgSrc = p.image || (p.gallery && p.gallery[0] ? p.gallery[0] : 'https://placehold.co/400x250?text=No+Image');
                
                return `
                <div class="project-card" onclick="window.location.href='project.html?id=${index}'">
                    <div class="project-image-wrapper">
                        <img src="${imgSrc}" alt="${p.title}">
                    </div>
                    <div class="project-info">
                        <h3>${p.title}</h3>
                        <p>${p.description.substring(0, 80)}...</p>
                    </div>
                </div>`;
            }).reverse().join('');
        }
        renderProjects();
    </script>
</body>
</html>
