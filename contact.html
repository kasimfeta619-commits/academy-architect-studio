<!-- ЛЯВА СЕКЦИЯ: ДЕТАЙЛИ (Вече БЕЗ твоя личен имейл) -->
<div class="contact-info-block">
    <div class="info-group">
        <h3 id="lbl-office">Офиси</h3>
        <p>София · Пловдив · Варна</p>
    </div>
    <div class="info-group">
        <h3 id="lbl-email">Директен контакт</h3>
        <!-- Заменяме имейла с текст, който праща към формата -->
        <p><a href="#form-heading" style="color: #8c8275; text-decoration: underline;">Използвайте формата за запитвания</a></p>
    </div>
    <div class="info-group">
        <h3 id="lbl-phone">Телефон</h3>
        <p>+359 888 123 456</p>
    </div>
    <div class="info-group">
        <h3 id="lbl-hours">Работно време</h3>
        <p id="txt-hours">Понеделник - Петък: 09:00 - 18:00</p>
    </div>
</div>

<!-- ДЯСНА СЕКЦИЯ: ФОРМА (Имейлът ти е скрит зад ключа!) -->
<form class="contact-form" action="https://api.web3forms.com/submit" method="POST">
    
    <!-- Твоят имейл НЕ СЕ пише тук. Сложи само генерирания ключ от Web3Forms: -->
    <input type="hidden" name="access_key" value="СЛОЖИ_ТУК_КЛЮЧА_ОТ_САЙТА">
    
    <!-- Опция: автоматично пренасочване след изпращане (за да не излиза грозна страница) -->
    <input type="hidden" name="redirect" value="https://academy-architect-studio-61pw12xqg-kasimfeta619-projects.vercel.app/contact.html">

    <h2 id="form-heading">Пишете ни директно</h2>
    
    <div class="form-field">
        <label id="lbl-form-name">Вашето име</label>
        <input type="text" name="name" placeholder="Иван Иванов" required>
    </div>
    
    <div class="form-field">
        <label id="lbl-form-email">Имейл за обратна връзка</label>
        <input type="email" name="email" placeholder="name@example.com" required>
    </div>
    
    <div class="form-field">
        <label id="lbl-form-msg">Съобщение</label>
        <textarea name="message" placeholder="Здравейте, интересувам се от проект..." required></textarea>
    </div>
    
    <button type="submit" class="btn-submit" id="btn-submit">Изпрати запитване</button>
</form>
