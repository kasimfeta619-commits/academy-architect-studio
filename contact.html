<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Contact | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/logo.png" alt="Logo" class="logo-icon">
            <span>Academy Architect Studio</span>
        </a>
        <nav>
            <a href="index.html">Home</a>
            <a href="catalog.html">Catalog</a>
            <a href="about.html">About</a>
            <a href="contact.html" class="active">Contact</a>
        </nav>
        <div class="lang-switcher">
            <button class="lang-btn active" onclick="setLang('en')">EN</button>
            <button class="lang-btn" onclick="setLang('bg')">BG</button>
        </div>
    </header>

    <main class="content-wrapper">
        <span class="eyebrow" id="eyebrow">CONTACT</span>
        <h1 id="title">Write about a project or an adaptation.</h1>
    </main>

    <footer class="main-footer">
        <div class="footer-logo-area">
            <img src="assets/logo.png" alt="Logo" class="footer-logo">
            <div><strong>Academy Architect Studio</strong><br>ARCHITECTURAL DESIGN STUDIO</div>
        </div>
        <div class="footer-col">
            <h4>STUDIO</h4>
            <p>Sofia · Plovdiv · Varna</p>
            <p>hello@academyarchitectstudios.com</p>
        </div>
        <div class="footer-col">
            <p>© 2026<br>Academy Architect Studio — All rights reserved.</p>
        </div>
    </footer>

    <script>
        function setLang(lang) {
            const tr = {
                en: { e: "CONTACT", t: "Write about a project or an adaptation." },
                bg: { e: "КОНТАКТ", t: "Пишете за проект или адаптация." }
            };
            document.getElementById('eyebrow').innerText = tr[lang].e;
            document.getElementById('title').innerText = tr[lang].t;
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.innerText.toLowerCase() === lang));
        }
    </script>
</body>
</html>
