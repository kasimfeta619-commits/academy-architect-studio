<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Academy Architect | Админ и Каталог</title>
    <style>
        body { font-family: sans-serif; padding: 20px; background: #fbf9f4; }
        .container { max-width: 900px; margin: auto; }
        .section { background: white; padding: 20px; border: 1px solid #eadecc; margin-bottom: 30px; }
        .grid-form { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        input, textarea { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        .btn-main { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; cursor: pointer; }
        .catalog-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; }
        .card { border: 1px solid #ddd; padding: 15px; background: #fff; }
        .card img { width: 100%; height: 150px; object-fit: cover; }
    </style>
</head>
<body>

<div class="container">
    <!-- АДМИН ПАНЕЛ -->
    <div class="section">
        <h2>Добавяне на нов проект</h2>
        <form id="uploadForm">
            <input type="text" id="pTitle" placeholder="Име на проекта" required>
            <textarea id="pDesc" placeholder="Описание"></textarea>
            <div class="grid-form">
                <input type="text" id="pArea" placeholder="Площ (м²)">
                <input type="number" id="pFloors" placeholder="Етажи">
                <input type="number" id="pBeds" placeholder="Спални">
                <input type="number" id="pBaths" placeholder="Бани">
                <input type="number" id="pGarage" placeholder="Гаражни места">
                <input type="text" id="pPrice" placeholder="Цена">
            </div>
            <input type="file" id="pFile" accept="image/*" required>
            <button type="submit" class="btn-main">Запази и публикувай</button>
        </form>
    </div>

    <!-- ПУБЛИЧЕН КАТАЛОГ -->
    <h2>Публикувани проекти</h2>
    <div id="catalog" class="catalog-grid"></div>
</div>

<script>
    const render = () => {
        const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
        const cat = document.getElementById('catalog');
        cat.innerHTML = projects.map((p, i) => `
            <div class="card">
                <img src="${p.img}">
                <h3>${p.title}</h3>
                <p>Площ: ${p.area}м² | Спални: ${p.beds}</p>
                <p>Бани: ${p.baths} | Етажи: ${p.floors}</p>
                <p><strong>Цена: ${p.price}</strong></p>
                <button onclick="del(${i})">Изтрий</button>
            </div>
        `).join('');
    };

    document.getElementById('uploadForm').addEventListener('submit', (e) => {
        e.preventDefault();
        const reader = new FileReader();
        reader.onload = (e) => {
            const list = JSON.parse(localStorage.getItem('myProjects') || '[]');
            list.push({
                title: document.getElementById('pTitle').value,
                desc: document.getElementById('pDesc').value,
                area: document.getElementById('pArea').value,
                floors: document.getElementById('pFloors').value,
                beds: document.getElementById('pBeds').value,
                baths: document.getElementById('pBaths').value,
                garage: document.getElementById('pGarage').value,
                price: document.getElementById('pPrice').value,
                img: e.target.result
            });
            localStorage.setItem('myProjects', JSON.stringify(list));
            location.reload();
        };
        reader.readAsDataURL(document.getElementById('pFile').files[0]);
    });

    function del(i) {
        let list = JSON.parse(localStorage.getItem('myProjects'));
        list.splice(i, 1);
        localStorage.setItem('myProjects', JSON.stringify(list));
        location.reload();
    }

    render();
</script>

</body>
</html>
