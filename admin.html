<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ Панел | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .admin-container {
            max-width: 600px;
            margin: 60px auto;
            padding: 40px;
            background: #fbf9f4;
            border: 1px solid #eadecc;
        }
        .admin-container h2 {
            font-size: 1.6rem;
            font-weight: 400;
            margin-bottom: 30px;
            color: #1a1a1a;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
            color: #8c8275;
            font-weight: 600;
        }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #eadecc;
            background: #fff;
            font-family: inherit;
            font-size: 1rem;
            box-sizing: border-box;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .btn-upload {
            width: 100%;
            padding: 14px;
            background: #1a1a1a;
            color: #fff;
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .btn-upload:hover {
            background: #333;
        }
        .status-msg {
            margin-top: 15px;
            font-size: 0.95rem;
            font-weight: 600;
            display: none;
        }
    </style>
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo-area">
            <span>Academy Architect <span class="logo-studio">Studio - Admin</span></span>
        </a>
        <button onclick="logout()" style="background:none; border:1px solid #1a1a1a; padding: 8px 15px; cursor:pointer;">Изход</button>
    </header>

    <main>
        <div class="admin-container">
            <h2>Добавяне на нов проект</h2>
            <form id="uploadForm">
                <div class="form-group">
                    <label>Име на проекта</label>
                    <input type="text" id="projectTitle" required placeholder="Модерна къща в София">
                </div>
                <div class="form-group">
                    <label>Описание</label>
                    <textarea id="projectDesc" required placeholder="Кратко описание на проекта, материали..."></textarea>
                </div>
                <div class="form-group">
                    <label>Снимка на проекта</label>
                    <input type="file" id="projectImage" accept="image/*" required style="border: none; padding: 5px 0;">
                </div>
                <button type="submit" class="btn-upload" id="submitBtn">Качи в каталога</button>
                <div class="status-msg" id="statusMsg"></div>
            </form>
        </div>
    </main>

    <script>
        // Защита: Ако не си влязъл през login.html, те връща обратно
        window.onload = function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            // Временно изключваме строгата проверка, за да можеш да тестваш лесно, 
            // но е хубаво да влизаш през login.html
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const statusMsg = document.getElementById('statusMsg');
            
            const title = document.getElementById('projectTitle').value;
            const desc = document.getElementById('projectDesc').value;
            const fileInput = document.getElementById('projectImage');
            const file = fileInput.files[0];

            if (!file) return;

            submitBtn.innerText = "Качване...";
            submitBtn.disabled = true;

            // Използваме FileReader, за да превърнем снимката в код, който браузърът може да запази
            const reader = new FileReader();
            reader.onloadend = function() {
                const base64Image = reader.result;

                // Взимаме досегашните проекти от паметта или създаваме празен списък
                let projects = JSON.parse(localStorage.getItem('myProjects')) || [];

                // Добавяме новия проект
                const newProject = {
                    title: title,
                    description: desc,
                    image: base64Image,
                    date: new Date().toLocaleDateString('bg-BG')
                };

                projects.push(newProject);

                // Записваме обратно в паметта на браузъра
                localStorage.setItem('myProjects', JSON.stringify(projects));

                // Успех!
                statusMsg.style.color = "green";
                statusMsg.innerText = "Успешно качен проект в каталога!";
                statusMsg.style.display = "block";
                
                document.getElementById('uploadForm').reset();
                submitBtn.innerText = "Качи в каталога";
                submitBtn.disabled = false;
            };

            reader.readAsDataURL(file);
        });

        function logout() {
            localStorage.removeItem('isLoggedIn');
            window.location.href = "login.html";
        }
    </script>
</body>
</html>
