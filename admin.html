<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle" data-key="admin-page-title">Админ панел | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Скрипт за мигновено зареждане на темата без премигване -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();

        // ЗАЩИТА НА АДМИН ПАНЕЛА
        (function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const isAdmin = localStorage.getItem('isAdmin');
            
            const userEmail = (
                localStorage.getItem('loggedInUserEmail') || 
                localStorage.getItem('userEmail') || 
                localStorage.getItem('email') || 
                ''
            ).trim().toLowerCase(); 

            const myAdminEmail = 'admin@architect.bg';

            if (userEmail === myAdminEmail || isAdmin === 'true') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true');
                return;
            }

            if (isLoggedIn !== 'true') {
                alert('Моля, влезте в профила си, за да достъпите админ панела.');
                window.location.href = 'login.html';
                return;
            }

            alert('Достъпът е разрешен само за администратори!');
            window.location.href = 'index.html';
        })();
    </script>

    <style>
        body { background-color: var(--bg-color, #fbf9f4); color: var(--text-color, #1a1a1a); font-family: sans-serif; margin: 0; transition: background-color 0.3s, color 0.3s; }
        .admin-container { padding: 40px 8%; max-width: 950px; margin: 0 auto; min-height: 80vh; }
        .back-home-link { display: inline-block; margin-bottom: 20px; color: #8c8275; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .back-home-link:hover { color: var(--text-color, #1a1a1a); }

        /* Стилове за профилната икона (Аватар с Онлайн статус) */
        .user-avatar-badge {
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 42px;
            height: 42px;
            background-color: #ebebeb;
            border-radius: 50%;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .user-avatar-badge svg {
            fill: #1a1a1a;
            transition: fill 0.3s;
        }
        .online-status-dot {
            position: absolute;
            top: 1px;
            right: 1px;
            width: 11px;
            height: 11px;
            background-color: #2ecc71;
            border: 2px solid #fbf9f4;
            border-radius: 50%;
            transition: border-color 0.3s;
        }
        
        /* Езиков превключвател */
        .lang-switcher {
            display: flex;
            gap: 4px;
            background: rgba(0,0,0,0.04);
            padding: 3px;
            border-radius: 4px;
            border: 1px solid var(--border-color, #eadecc);
        }
        .lang-btn {
            background: none;
            border: none;
            padding: 4px 8px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            color: inherit;
            border-radius: 2px;
            transition: background 0.2s, color 0.2s;
        }
        .lang-btn.active {
            background: #1a1a1a;
            color: #fff;
        }
        body.dark-mode .lang-btn.active {
            background: #eadecc;
            color: #1a1a1a;
        }
        body.dark-mode .lang-switcher {
            background: rgba(255,255,255,0.05);
        }
        
        /* Навигация с табове */
        .admin-nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--border-color, #eadecc); padding-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: #f4eee5; border: 1px solid #eadecc; padding: 12px 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; color: #555; transition: all 0.2s; flex: 1; text-align: center; min-width: 140px; }
        .tab-btn:hover { background: #eadecc; color: #1a1a1a; }
        .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        /* Секции (страници) */
        .admin-section { display: none; background: #f4eee5; padding: 40px; border: 1px solid #eadecc; margin-bottom: 40px; transition: background-color 0.3s, border-color 0.3s; }
        .admin-section.active { display: block; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8c8275; font-weight: 700; }
        .form-group input[type="text"], 
        .form-group select, 
        .form-group textarea { padding: 12px; border: 1px solid #eadecc; background: #fff; font-size: 1rem; color: #1a1a1a; outline: none; width: 100%; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; font-family: inherit; }
        .form-group textarea { resize: vertical; height: 120px; }
        .form-group input[type="file"] { padding: 10px; background: #fff; border: 1px solid #eadecc; width: 100%; box-sizing: border-box; color: inherit; }
        .checkbox-group { flex-direction: row; align-items: center; gap: 10px; }
        .checkbox-group input { width: 20px; height: 20px; }
        
        .btn-action { background: #1a1a1a; color: #fff; padding: 15px 30px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; }
        .btn-action:hover { background: #333; }
        
        /* Списък с проекти и резервации */
        .project-item-admin, .booking-item-admin { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border: 1px solid #eadecc; margin-bottom: 12px; gap: 15px; transition: background-color 0.3s, border-color 0.3s; }
        .project-info-wrapper { display: flex; align-items: center; gap: 15px; }
        .admin-project-thumb { width: 65px; height: 65px; object-fit: cover; border: 1px solid #eadecc; flex-shrink: 0; }
        .admin-project-no-thumb { width: 65px; height: 65px; background: #f4eee5; border: 1px solid #eadecc; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #8c8275; text-align: center; flex-shrink: 0; text-transform: uppercase; }

        .admin-btns { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
        .btn-view { background: #1a1a1a; color: #fff; text-decoration: none; padding: 8px 12px; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; border-radius: 3px; transition: background 0.2s; border: none; cursor: pointer; }
        .btn-view:hover { background: #333; }
        .btn-edit { background: #8c8275; color: #fff; border: none; padding: 8px 12px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; border-radius: 3px; }
        .btn-edit:hover { background: #736a5e; }
        .btn-delete { background: #a83232; color: #fff; border: none; padding: 8px 12px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; border-radius: 3px; }
        .btn-delete:hover { background: #872828; }

        /* МОДАЛЕН ПРОЗОРЕЦ ЗА ПРЕГЛЕД */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.7); z-index: 1000; justify-content: center; align-items: center; padding: 20px; box-sizing: border-box; }
        .modal-content { background: #fbf9f4; color: #1a1a1a; max-width: 800px; width: 100%; max-height: 90vh; overflow-y: auto; padding: 30px; border-radius: 4px; position: relative; border: 1px solid #eadecc; }
        .modal-close { position: absolute; top: 15px; right: 20px; font-size: 1.8rem; cursor: pointer; font-weight: bold; color: #8c8275; }
        .modal-close:hover { color: #1a1a1a; }
        .preview-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; margin-top: 10px; }
        .preview-grid img { width: 100%; height: 100px; object-fit: cover; border: 1px solid #eadecc; }

        /* Dark Mode поддръжка */
        body.dark-mode { background-color: #121212 !important; color: #ffffff !important; }
        body.dark-mode header.navbar { background: #1a1a1a !important; border-bottom-color: #2c2c2c !important; }
        body.dark-mode header.navbar span { color: #ffffff !important; }
        body.dark-mode .user-avatar-badge { background-color: #2d2d2d !important; }
        body.dark-mode .user-avatar-badge svg { fill: #ffffff !important; }
        body.dark-mode .online-status-dot { border-color: #1a1a1a !important; }
        body.dark-mode .admin-section { background: #1e1e1e !important; border-color: #2c2c2c !important; }
        body.dark-mode .admin-nav-tabs { border-bottom-color: #2c2c2c !important; }
        body.dark-mode .tab-btn { background: #252525 !important; border-color: #333 !important; color: #bbb !important; }
        body.dark-mode .tab-btn:hover { background: #333 !important; color: #fff !important; }
        body.dark-mode .tab-btn.active { background: #eadecc !important; color: #1a1a1a !important; border-color: #eadecc !important; }
        body.dark-mode .form-group input[type="text"], 
        body.dark-mode .form-group select, 
        body.dark-mode .form-group textarea,
        body.dark-mode .form-group input[type="file"] { background: #121212 !important; border-color: #444 !important; color: #ffffff !important; }
        body.dark-mode .project-item-admin, 
        body.dark-mode .booking-item-admin { background: #1e1e1e !important; border-color: #2c2c2c !important; }
        body.dark-mode .admin-project-no-thumb { background: #252525 !important; border-color: #333 !important; }
        body.dark-mode h1, 
        body.dark-mode h3, 
        body.dark-mode label,
        body.dark-mode .checkbox-group label { color: #ffffff !important; }
        body.dark-mode .btn-action { background-color: #eadecc; color: #1a1a1a; }
        body.dark-mode .btn-action:hover { background-color: #d4c8b6; }
        body.dark-mode .btn-view { background: #eadecc; color: #1a1a1a; }
        body.dark-mode .btn-view:hover { background: #d4c8b6; }
        body.dark-mode .modal-content { background: #1e1e1e; color: #fff; border-color: #333; }

        /* Мобилна оптимизация */
        @media (max-width: 768px) {
            .admin-container { padding: 20px 4%; }
            .admin-nav-tabs { flex-direction: column; gap: 8px; }
            .tab-btn { width: 100%; min-width: 100%; padding: 14px; font-size: 0.8rem; }
            .admin-section { padding: 20px 15px; }
            h1 { font-size: 2rem !important; }
            .project-item-admin, .booking-item-admin { flex-direction: column; align-items: flex-start; gap: 12px; }
            .project-info-wrapper { width: 100%; }
            .admin-btns { width: 100%; display: flex; justify-content: flex-start; flex-wrap: wrap; }
            .btn-view, .btn-edit, .btn-delete { padding: 10px 14px; font-size: 0.85rem; flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="navbar" style="padding: 15px 5%; border-bottom: 1px solid #eadecc; display: flex; align-items: center; justify-content: space-between; background: #fbf9f4;">
        <!-- Лого -->
        <a href="index.html" class="logo-area" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <svg style="height: 30px; width: 30px; fill: #8c8275;" viewBox="0 0 24 24">
                <path d="M12 3L2 12h3v8h14v-8h3L12 3zm0 2.84L17 10.5V18H7v-7.5l5-4.66z"/>
            </svg>
            <span style="font-weight: 500; color: var(--text-color, #1a1a1a); font-size: 1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
        </a>

        <!-- Дясна част: Аватар + Езици + Dark Mode + Изход -->
        <div style="display: flex; align-items: center; gap: 12px;">
            <div class="user-avatar-badge" title="Влезли сте като Администратор (Онлайн)">
                <svg width="22" height="22" viewBox="0 0 24 24">
                    <path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/>
                </svg>
                <span class="online-status-dot"></span>
            </div>

            <!-- Езиков превключвател -->
            <div class="lang-switcher">
                <button class="lang-btn" id="btn-en" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn active" id="btn-bg" onclick="setLanguage('bg')">BG</button>
            </div>

            <button id="darkModeBtn" onclick="toggleDarkMode()" style="background: none; border: 1px solid var(--border-color, #eadecc); padding: 8px 12px; cursor: pointer; border-radius: 4px; color: inherit; font-size: 0.85rem;">🌙 Dark</button>
            
            <button onclick="logoutAdmin()" style="background: #a83232; border: none; padding: 8px 12px; cursor: pointer; border-radius: 4px; color: #fff; font-size: 0.85rem; font-weight: 600;" data-key="admin-logout">🚪 Изход</button>
        </div>
    </header>

    <main class="admin-container">
        <a href="index.html" class="back-home-link" data-key="admin-back-home">← Назад към началната страница</a>
        
        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8c8275; font-weight: 700;" data-key="admin-eyebrow">УПРАВЛЕНИЕ НА САЙТА</span>
        <h1 style="font-size: 2.5rem; font-weight: 400; margin-top: 5px; color: #1a1a1a; margin-bottom: 20px;" data-key="admin-title">Админ Панел</h1>

        <!-- НАВИГАЦИЯ МЕЖДУ СТРАНИЦИТЕ / ТАБОВЕТЕ -->
        <div class="admin-nav-tabs">
            <button class="tab-btn active" onclick="switchTab('aboutTab', this)" data-key="admin-tab-about">📄 За нас</button>
            <button class="tab-btn" onclick="switchTab('contactTab', this)" data-key="admin-tab-contact">📞 Контакти</button>
            <button class="tab-btn" onclick="switchTab('uploadTab', this)" id="uploadTabBtn" data-key="admin-tab-new">➕ Нов проект</button>
            <button class="tab-btn" onclick="switchTab('projectsTab', this)" data-key="admin-tab-projects">🗂️ Проекти</button>
            <button class="tab-btn" onclick="switchTab('bookingsTab', this)" data-key="admin-tab-bookings">📅 Резервации</button>
        </div>
        
        <!-- СТРАНИЦА 1: РЕДАКЦИЯ "ЗА НАС" -->
        <div id="aboutTab" class="admin-section active">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;" data-key="admin-about-heading">Редакция на страница "За нас"</h3>
            <form id="aboutForm">
                <div class="form-group"><label data-key="admin-label-title">Заглавие</label><input type="text" id="aboutTitle"></div>
                <div class="form-group"><label data-key="admin-label-desc">Основен текст / Описание</label><textarea id="aboutDesc" style="height: 150px;"></textarea></div>
                <button type="submit" class="btn-action" data-key="admin-btn-save-about">Запази промените "За нас"</button>
            </form>
        </div>

        <!-- СТРАНИЦА 2: РЕДАКЦИЯ "КОНТАКТИ" -->
        <div id="contactTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;" data-key="admin-contact-heading">Редакция на страница "Контакти"</h3>
            <form id="contactForm">
                <div class="form-group"><label data-key="admin-label-address">Адрес на студиото</label><input type="text" id="contactAddress"></div>
                <div class="form-group"><label data-key="admin-label-email">Имейл адрес</label><input type="text" id="contactEmail"></div>
                <div class="form-group"><label data-key="admin-label-phone">Телефонен номер</label><input type="text" id="contactPhone"></div>
                <button type="submit" class="btn-action" data-key="admin-btn-save-contact">Запази промените "Контакти"</button>
            </form>
        </div>

        <!-- СТРАНИЦА 3: КАЧВАНЕ НА НОВ ПРОЕКТ -->
        <div id="uploadTab" class="admin-section">
            <h3 id="formTitle" style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;" data-key="admin-upload-heading">Качване на нов проект</h3>
            <form id="uploadForm">
                <input type="hidden" id="editIndex" value="">

                <div class="form-group"><label data-key="admin-proj-title">Име на проекта *</label><input type="text" id="title" required></div>
                
                <div class="form-group">
                    <label data-key="admin-proj-maincat">Главна категория *</label>
                    <select id="mainCategory" required>
                        <option value="residential" data-key="cat-residential">🏠 Жилищна и многофамилна сграда</option>
                        <option value="commercial" data-key="cat-commercial">🏢 Търговски обект и промишлена сграда</option>
                        <option value="interior" data-key="cat-interior">🛋️ Интериорен дизайн и обзавеждане</option>
                    </select>
                </div>

                <div class="form-group">
                    <label data-key="admin-proj-subcat">Подкатегория (Тип разработка) *</label>
                    <select id="subCategory" required>
                        <option value="architecture" data-key="subcat-architecture">📐 Архитектурен проект</option>
                        <option value="3d" data-key="subcat-3d">🖼️ 3D сграда / Визуализация</option>
                    </select>
                </div>

                <div class="form-group"><label data-key="admin-proj-desc">Описание</label><textarea id="desc"></textarea></div>
                <div class="form-group"><label data-key="admin-proj-area">Площ (м²)</label><input type="text" id="area"></div>
                <div class="form-group"><label data-key="admin-proj-floors">Етажи</label><input type="text" id="floors"></div>
                <div class="form-group"><label data-key="admin-proj-beds">Спални</label><input type="text" id="beds"></div>
                <div class="form-group"><label data-key="admin-proj-baths">Бани</label><input type="text" id="baths"></div>
                <div class="form-group"><label data-key="admin-proj-material">Материал / Конструкция</label><input type="text" id="material"></div>
                <div class="form-group"><label data-key="admin-proj-style">Стил</label><input type="text" id="style"></div>
                <div class="form-group"><label data-key="admin-proj-price">Цена (лв.)</label><input type="text" id="price"></div>
                
                <hr style="border: 0; border-top: 1px solid #eadecc; margin: 25px 0;">
                
                <div class="form-group"><label data-key="admin-proj-mainimg">Главна снимка</label><input type="file" id="mainImg"></div>
                <div class="form-group"><label data-key="admin-proj-plans">Разпределения / Планове (множество етажи)</label><input type="file" id="planImgs" multiple></div>
                <div class="form-group"><label data-key="admin-proj-facades">Фасади (може да изберете няколко)</label><input type="file" id="facadeImgs" multiple></div>
                <div class="form-group"><label data-key="admin-proj-section">Разрез</label><input type="file" id="sectionImg"></div>
                <div class="form-group"><label data-key="admin-proj-gallery">Допълнителни визуализации</label><input type="file" id="galleryImgs" multiple></div>

                <div class="form-group checkbox-group" style="margin-top: 20px;">
                    <input type="checkbox" id="isFav"> 
                    <label for="isFav" style="cursor: pointer; font-size: 0.85rem; font-weight: 600;" data-key="admin-proj-fav">Фаворитен проект (на началната страница)</label>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-action" style="margin-top: 20px;" data-key="admin-btn-save-proj">Запази проекта в каталога</button>
                <button type="button" id="cancelBtn" onclick="resetProjectForm()" class="btn-action" style="margin-top: 10px; background: #8c8275; display: none;" data-key="admin-btn-cancel">Отказ</button>
            </form>
        </div>

        <!-- СТРАНИЦА 4: СЪЩЕСТВУВАЩИ ПРОЕКТИ -->
        <div id="projectsTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;" data-key="admin-existing-projects">Съществуващи проекти</h3>
            <div id="adminProjectsList"></div>
        </div>

        <!-- СТРАНИЦА 5: РЕЗЕРВАЦИИ -->
        <div id="bookingsTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;" data-key="admin-existing-bookings">Запазени консултации</h3>
            <div id="adminBookingsList"></div>
        </div>
    </main>

    <!-- МОДАЛЕН ПРОЗОРЕЦ ЗА ПРЕГЛЕД НА ПРОЕКТ -->
    <div id="previewModal" class="modal-overlay" onclick="closePreviewModal(event)">
        <div class="modal-content">
            <span class="modal-close" onclick="closePreviewModal(true)">&times;</span>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- СКРИПТОВЕ -->
    <script src="auth.js"></script>
    <script src="translations.js"></script>
    <script>
        function toggleDarkMode() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('siteTheme', 'dark');
            } else {
                localStorage.setItem('siteTheme', 'light');
            }
        }

        function logoutAdmin() {
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            const confirmMsg = currentLang === 'en' 
                ? "Are you sure you want to log out from the admin panel?" 
                : "Сигурни ли сте, че искате да излезете от админ панела?";

            if (confirm(confirmMsg)) {
                localStorage.removeItem('isLoggedIn');
                localStorage.removeItem('isAdmin');
                localStorage.removeItem('loggedInUserEmail');
                localStorage.removeItem('userEmail');
                localStorage.removeItem('email');
                window.location.href = 'index.html';
            }
        }

        function switchTab(tabId, btnElement) {
            document.querySelectorAll('.admin-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabId).classList.add('active');
            btnElement.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            // Инициализиране на езика при зареждане
            if (typeof initLanguage === 'function') {
                initLanguage();
            } else if (typeof setLanguage === 'function') {
                const savedLang = localStorage.getItem('siteLang') || 'bg';
                setLanguage(savedLang);
            }

            const savedAbout = JSON.parse(localStorage.getItem('siteAbout') || '{}');
            document.getElementById('aboutTitle').value = savedAbout.title || 'За нашето архитектурно студио';
            document.getElementById('aboutDesc').value = savedAbout.desc || 'Ние създаваме съвременни и функционални пространства...';

            const savedContact = JSON.parse(localStorage.getItem('siteContact') || '{}');
            document.getElementById('contactAddress').value = savedContact.address || 'Sofia · Plovdiv · Varna';
            document.getElementById('contactEmail').value = savedContact.email || 'info@architectstudio.com';
            document.getElementById('contactPhone').value = savedContact.phone || '+359 888 000 000';

            renderAdminList();
            renderAdminBookings();
        });

        document.getElementById('aboutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const aboutData = {
                title: document.getElementById('aboutTitle').value,
                desc: document.getElementById('aboutDesc').value
            };
            localStorage.setItem('siteAbout', JSON.stringify(aboutData));
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            alert(currentLang === 'en' ? 'About page successfully updated!' : 'Страницата "За нас" е успешно обновена!');
        });

        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const contactData = {
                address: document.getElementById('contactAddress').value,
                email: document.getElementById('contactEmail').value,
                phone: document.getElementById('contactPhone').value
            };
            localStorage.setItem('siteContact', JSON.stringify(contactData));
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            alert(currentLang === 'en' ? 'Contacts page successfully updated!' : 'Страницата "Контакти" е успешно обновена!');
        });

        function renderAdminList() {
            const listContainer = document.getElementById('adminProjectsList');
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            
            if (projects.length === 0) {
                const noProjText = currentLang === 'en' ? 'No projects uploaded yet.' : 'Все още няма качени проекти.';
                listContainer.innerHTML = `<p style="color: #8c8275;">${noProjText}</p>`;
                return;
            }

            const mainCatNames = {
                'residential': currentLang === 'en' ? 'Residential' : 'Жилищна',
                'commercial': currentLang === 'en' ? 'Commercial' : 'Търговска/Промишлена',
                'interior': currentLang === 'en' ? 'Interior' : 'Интериор'
            };

            const subCatNames = {
                'architecture': currentLang === 'en' ? 'Architecture' : 'Архитектура',
                '3d': currentLang === 'en' ? '3D Building' : '3D сграда'
            };

            const noPhotoText = currentLang === 'en' ? 'No photo' : 'Няма снимка';
            const viewText = currentLang === 'en' ? '👁️ View' : '👁️ Преглед';
            const editText = currentLang === 'en' ? 'Edit' : 'Редактирай';
            const deleteText = currentLang === 'en' ? 'Delete' : 'Изтрий';
            const styleText = currentLang === 'en' ? 'Style' : 'Стил';
            const areaText = currentLang === 'en' ? 'Area' : 'Площ';

            listContainer.innerHTML = projects.map((p, index) => {
                let thumbHtml = p.mainImage 
                    ? `<img src="${p.mainImage}" alt="${p.title}" class="admin-project-thumb">`
                    : `<div class="admin-project-no-thumb">${noPhotoText}</div>`;

                const mainCatLabel = mainCatNames[p.mainCategory] || mainCatNames['residential'];
                const subCatLabel = subCatNames[p.subCategory] || subCatNames['architecture'];

                return `
                    <div class="project-item-admin">
                        <div class="project-info-wrapper">
                            ${thumbHtml}
                            <div>
                                <strong style="font-size: 1.05rem; display: block; margin-bottom: 3px;">${p.title}</strong>
                                <div style="font-size: 0.8rem; color: #8c8275;">
                                    📁 ${mainCatLabel} (${subCatLabel}) | ${styleText}: ${p.style || '-'} | ${areaText}: ${p.area ? p.area + ' кв.м' : '-'}
                                </div>
                            </div>
                        </div>
                        <div class="admin-btns">
                            <button class="btn-view" onclick="openPreviewModal(${index})">${viewText}</button>
                            <button class="btn-edit" onclick="editProject(${index})">${editText}</button>
                            <button class="btn-delete" onclick="deleteProject(${index})">${deleteText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function openPreviewModal(index) {
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const p = projects[index];
            if (!p) return;

            const modalBody = document.getElementById('modalBody');
            const currentLang = localStorage.getItem('siteLang') || 'bg';

            let floorPlansHtml = p.floorPlans && p.floorPlans.length ? p.floorPlans.map(img => `<img src="${img}">`).join('') : '';
            let facadeHtml = p.facadeImages && p.facadeImages.length ? p.facadeImages.map(img => `<img src="${img}">`).join('') : '';
            let galleryHtml = p.gallery && p.gallery.length ? p.gallery.map(img => `<img src="${img}">`).join('') : '';

            const descLabel = currentLang === 'en' ? 'Description' : 'Описание';
            const detailsLabel = currentLang === 'en' ? 'Details' : 'Детайли';
            const priceLabel = currentLang === 'en' ? 'Price' : 'Цена';
            const plansLabel = currentLang === 'en' ? 'Floor Plans' : 'Планове / Разпределения';
            const facadesLabel = currentLang === 'en' ? 'Facades' : 'Фасади';
            const sectionLabel = currentLang === 'en' ? 'Section' : 'Разрез';
            const galleryLabel = currentLang === 'en' ? 'Gallery' : 'Галерия';

            modalBody.innerHTML = `
                <h2 style="margin-top:0;">${p.title}</h2>
                ${p.mainImage ? `<img src="${p.mainImage}" style="width:100%; max-height: 350px; object-fit: cover; border-radius: 4px; margin-bottom: 15px;">` : ''}
                <p><strong>${descLabel}:</strong> ${p.desc || '-'}</p>
                <p><strong>${detailsLabel}:</strong> Площ: ${p.area || '-'} м² | Етажи: ${p.floors || '-'} | Спални: ${p.beds || '-'} | Бани: ${p.baths || '-'} | Стил: ${p.style || '-'}</p>
                <p><strong>${priceLabel}:</strong> ${p.price ? p.price + ' лв.' : '-'}</p>
                
                ${floorPlansHtml ? `<h4>${plansLabel}</h4><div class="preview-grid">${floorPlansHtml}</div>` : ''}
                ${facadeHtml ? `<h4>${facadesLabel}</h4><div class="preview-grid">${facadeHtml}</div>` : ''}
                ${p.sectionImage ? `<h4>${sectionLabel}</h4><img src="${p.sectionImage}" style="width:100%; max-height:200px; object-fit:cover;">` : ''}
                ${galleryHtml ? `<h4>${galleryLabel}</h4><div class="preview-grid">${galleryHtml}</div>` : ''}
            `;

            document.getElementById('previewModal').style.display = 'flex';
        }

        function closePreviewModal(e) {
            if (e === true || e.target.id === 'previewModal') {
                document.getElementById('previewModal').style.display = 'none';
            }
        }

        function renderAdminBookings() {
            const listContainer = document.getElementById('adminBookingsList');
            const bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            
            if (bookings.length === 0) {
                const noBookingsText = currentLang === 'en' ? 'No bookings saved yet.' : 'Все още няма запазени резервации.';
                listContainer.innerHTML = `<p style="color: #8c8275;">${noBookingsText}</p>`;
                return;
            }

            const serviceText = currentLang === 'en' ? 'Service' : 'Услуга';
            const dateText = currentLang === 'en' ? 'Date & Time' : 'Дата и час';
            const deleteText = currentLang === 'en' ? 'Delete' : 'Изтрий';

            listContainer.innerHTML = bookings.map((b, index) => {
                return `
                    <div class="booking-item-admin">
                        <div>
                            <strong style="font-size: 1.05rem; display: block; margin-bottom: 3px;">${b.name} (${b.phone})</strong>
                            <div style="font-size: 0.8rem; color: #8c8275;">${serviceText}: ${b.service} | ${dateText}: ${b.datetime}</div>
                        </div>
                        <div class="admin-btns">
                            <button class="btn-delete" onclick="deleteBooking(${index})">${deleteText}</button>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function deleteBooking(index) {
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            const confirmMsg = currentLang === 'en' ? 'Are you sure you want to delete this booking?' : 'Сигурни ли сте, че искате да изтриете тази резервация?';

            if (confirm(confirmMsg)) {
                let bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
                bookings.splice(index, 1);
                localStorage.setItem('studioBookings', JSON.stringify(bookings));
                renderAdminBookings();
            }
        }

        function deleteProject(index) {
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            const confirmMsg = currentLang === 'en' ? 'Are you sure you want to delete this project?' : 'Сигурни ли сте, че искате да изтриете този проект?';

            if (confirm(confirmMsg)) {
                let projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
                projects.splice(index, 1);
                localStorage.setItem('myProjects', JSON.stringify(projects));
                renderAdminList();
                resetProjectForm();
            }
        }

        function editProject(index) {
            const projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            const p = projects[index];

            document.getElementById('editIndex').value = index;
            document.getElementById('title').value = p.title || '';
            document.getElementById('mainCategory').value = p.mainCategory || 'residential';
            document.getElementById('subCategory').value = p.subCategory || 'architecture';
            document.getElementById('desc').value = p.desc || '';
            document.getElementById('area').value = p.area || '';
            document.getElementById('floors').value = p.floors || '';
            document.getElementById('beds').value = p.beds || '';
            document.getElementById('baths').value = p.baths || '';
            document.getElementById('material').value = p.material || '';
            document.getElementById('style').value = p.style || '';
            document.getElementById('price').value = p.price || '';
            document.getElementById('isFav').checked = p.isFavorite || false;

            const currentLang = localStorage.getItem('siteLang') || 'bg';
            document.getElementById('formTitle').innerText = (currentLang === 'en' ? "Edit project: " : "Редактиране на проект: ") + p.title;
            document.getElementById('submitBtn').innerText = currentLang === 'en' ? "Save changes" : "Запази промените";
            document.getElementById('cancelBtn').style.display = 'block';
            document.getElementById('uploadTabBtn').innerText = currentLang === 'en' ? "✏️ Edit" : "✏️ Редакция";

            switchTab('uploadTab', document.getElementById('uploadTabBtn'));
        }

        function resetProjectForm() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editIndex').value = '';
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            document.getElementById('formTitle').innerText = currentLang === 'en' ? "Upload new project" : "Качване на нов проект";
            document.getElementById('submitBtn').innerText = currentLang === 'en' ? "Save project to catalog" : "Запази проекта в каталога";
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('uploadTabBtn').innerText = currentLang === 'en' ? "➕ New Project" : "➕ Нов проект";
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const editIndex = document.getElementById('editIndex').value;
            let projects = JSON.parse(localStorage.getItem('myProjects') || '[]');
            let existingProject = editIndex !== "" ? projects[editIndex] : {};

            const mainFile = document.getElementById('mainImg').files[0];
            const mainImage = mainFile ? await readFileAsDataURL(mainFile) : (existingProject.mainImage || '');

            const planFiles = document.getElementById('planImgs').files;
            let floorPlans = [...(existingProject.floorPlans || [])];
            for (let f of planFiles) {
                floorPlans.push(await readFileAsDataURL(f));
            }

            const facadeFiles = document.getElementById('facadeImgs').files;
            let facadeImages = [...(existingProject.facadeImages || [])];
            for (let f of facadeFiles) {
                facadeImages.push(await readFileAsDataURL(f));
            }

            const sectionFile = document.getElementById('sectionImg').files[0];
            const sectionImage = sectionFile ? await readFileAsDataURL(sectionFile) : (existingProject.sectionImage || '');

            const galleryFiles = document.getElementById('galleryImgs').files;
            let gallery = [...(existingProject.gallery || [])];
            for (let f of galleryFiles) {
                gallery.push(await readFileAsDataURL(f));
            }

            const projectData = {
                title: document.getElementById('title').value,
                mainCategory: document.getElementById('mainCategory').value,
                subCategory: document.getElementById('subCategory').value,
                desc: document.getElementById('desc').value,
                area: document.getElementById('area').value,
                floors: document.getElementById('floors').value,
                beds: document.getElementById('beds').value,
                baths: document.getElementById('baths').value,
                material: document.getElementById('material').value,
                style: document.getElementById('style').value,
                price: document.getElementById('price').value,
                isFavorite: document.getElementById('isFav').checked,
                mainImage: mainImage,
                floorPlans: floorPlans,
                facadeImages: facadeImages,
                sectionImage: sectionImage,
                gallery: gallery
            };

            if (editIndex !== "") {
                projects[editIndex] = projectData;
            } else {
                projects.push(projectData);
            }

            localStorage.setItem('myProjects', JSON.stringify(projects));
            const currentLang = localStorage.getItem('siteLang') || 'bg';
            alert(currentLang === 'en' ? 'Project successfully saved in catalog!' : 'Проектът е успешно запазен в каталога!');
            
            resetProjectForm();
            renderAdminList();
            switchTab('projectsTab', document.querySelectorAll('.tab-btn')[3]);
        });
    </script>
</body>
</html>
