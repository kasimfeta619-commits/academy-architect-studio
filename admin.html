<script>
        // Функция за автоматично смаляване на снимки
        const toBase64 = (file) => new Promise((resolve) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    const MAX_WIDTH = 800;
                    const scale = Math.min(MAX_WIDTH / img.width, 1);
                    canvas.width = img.width * scale;
                    canvas.height = img.height * scale;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                    resolve(canvas.toDataURL('image/jpeg', 0.7));
                };
            };
        });

        function renderList() {
            const projects = JSON.parse(localStorage.getItem('myProjects')) || [];
            const listContainer = document.getElementById('projectList');
            listContainer.innerHTML = projects.map((p, index) => `
                <div class="pub-item">
                    <span>${p.title} ${p.isFavorite ? '⭐' : ''}</span>
                    <div>
                        <button onclick="editProject(${index})" class="btn-action">Редактирай</button>
                        <a href="project.html?id=${index}" target="_blank" class="btn-view">Виж</a>
                    </div>
                </div>
            `).join('');
        }

        // Поправена функция за редакция - добавени всички полета
        function editProject(index) {
            let projects = JSON.parse(localStorage.getItem('myProjects'));
            let p = projects[index];

            p.title = prompt("Име на проекта:", p.title) || p.title;
            p.description = prompt("Описание:", p.description) || p.description;
            p.area = prompt("Площ (м²):", p.area) || p.area;
            p.floors = prompt("Етажи:", p.floors) || p.floors;
            p.price = prompt("Цена:", p.price) || p.price;
            p.isFavorite = confirm("Маркирай като Фаворитен?");

            localStorage.setItem('myProjects', JSON.stringify(projects));
            alert("Проектът е актуализиран!");
            renderList();
        }

        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            alert("Обработвам снимките... моля изчакайте.");
            
            const gFiles = document.getElementById('galleryPhotos').files;
            const pFiles = document.getElementById('floorPlans').files;
            
            const gArr = []; for(let f of gFiles) gArr.push(await toBase64(f));
            const pArr = []; for(let f of pFiles) pArr.push(await toBase64(f));

            // Добавени всички полета в обекта
            const project = {
                title: document.getElementById('projectTitle').value,
                description: document.getElementById('projectDesc').value,
                area: document.getElementById('pArea').value,
                floors: document.getElementById('pFloors').value,
                beds: document.getElementById('pBeds').value,
                baths: document.getElementById('pBaths').value,
                garage: document.getElementById('pGarage').value,
                material: document.getElementById('pMat').value,
                style: document.getElementById('pStyle').value,
                price: document.getElementById('pPrice').value,
                isFavorite: document.getElementById('isFavorite').checked,
                gallery: gArr,
                plans: pArr
            };
            
            let projects = JSON.parse(localStorage.getItem('myProjects')) || [];
            projects.push(project);
            localStorage.setItem('myProjects', JSON.stringify(projects));
            alert("Успешно добавено!");
            document.getElementById('uploadForm').reset();
            renderList();
        });

        function exportData() {
            const data = localStorage.getItem('myProjects');
            if (!data) return alert("Няма данни!");
            const blob = new Blob([data], { type: 'application/json' });
            const a = document.createElement('a');
            a.href = URL.createObjectURL(blob);
            a.download = 'backup_projects.json';
            a.click();
        }

        function importData(event) {
            const file = event.target.files[0];
            const reader = new FileReader();
            reader.onload = (e) => {
                localStorage.setItem('myProjects', e.target.result);
                renderList();
                alert("Данните са възстановени!");
            };
            reader.readAsText(file);
        }

        renderList();
    </script>
