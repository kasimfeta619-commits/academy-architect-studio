<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Админ панел | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    
    <!-- Скрипт за мигновено зареждане на темата без премигване -->
    <script>
        (function() {
            const savedTheme = localStorage.getItem('siteTheme');
            if (savedTheme === 'dark') {
                document.body.classList.add('dark-mode');
            }
        })();

        // ЗАЩИТА НА АДМИН ПАНЕЛА
        (function() {
            const isLoggedIn = localStorage.getItem('isLoggedIn');
            const isAdmin = localStorage.getItem('isAdmin');
            
            const userEmail = (
                localStorage.getItem('loggedInUserEmail') || 
                localStorage.getItem('userEmail') || 
                localStorage.getItem('email') || 
                ''
            ).trim().toLowerCase(); 

            const myAdminEmail = 'admin@architect.bg';

            if (userEmail === myAdminEmail || isAdmin === 'true') {
                localStorage.setItem('isLoggedIn', 'true');
                localStorage.setItem('isAdmin', 'true');
                return;
            }

            if (isLoggedIn !== 'true') {
                alert('Моля, влезте в профила си, за да достъпите админ панела.');
                window.location.href = 'login.html';
                return;
            }

            alert('Достъпът е разрешен само за администратори!');
            window.location.href = 'index.html';
        })();
    </script>

    <style>
        body { background-color: var(--bg-color, #fbf9f4); color: var(--text-color, #1a1a1a); font-family: sans-serif; margin: 0; transition: background-color 0.3s, color 0.3s; }
        .admin-container { padding: 40px 8%; max-width: 950px; margin: 0 auto; min-height: 80vh; }
        .back-home-link { display: inline-block; margin-bottom: 20px; color: #8c8275; text-decoration: none; font-size: 0.85rem; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; }
        .back-home-link:hover { color: var(--text-color, #1a1a1a); }
        
        /* Навигация с табове */
        .admin-nav-tabs { display: flex; gap: 10px; margin-bottom: 30px; border-bottom: 2px solid var(--border-color, #eadecc); padding-bottom: 15px; flex-wrap: wrap; }
        .tab-btn { background: #f4eee5; border: 1px solid #eadecc; padding: 12px 15px; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; color: #555; transition: all 0.2s; flex: 1; text-align: center; min-width: 140px; }
        .tab-btn:hover { background: #eadecc; color: #1a1a1a; }
        .tab-btn.active { background: #1a1a1a; color: #fff; border-color: #1a1a1a; }

        /* Секции (страници) */
        .admin-section { display: none; background: #f4eee5; padding: 40px; border: 1px solid #eadecc; margin-bottom: 40px; transition: background-color 0.3s, border-color 0.3s; }
        .admin-section.active { display: block; }

        .form-group { margin-bottom: 20px; display: flex; flex-direction: column; gap: 8px; }
        .form-group label { font-size: 0.75rem; text-transform: uppercase; letter-spacing: 1px; color: #8c8275; font-weight: 700; }
        .form-group input[type="text"], 
        .form-group select, 
        .form-group textarea { padding: 12px; border: 1px solid #eadecc; background: #fff; font-size: 1rem; color: #1a1a1a; outline: none; width: 100%; box-sizing: border-box; transition: background-color 0.3s, border-color 0.3s, color 0.3s; font-family: inherit; }
        .form-group textarea { resize: vertical; height: 120px; }
        .form-group input[type="file"] { padding: 10px; background: #fff; border: 1px solid #eadecc; width: 100%; box-sizing: border-box; color: inherit; }
        .checkbox-group { flex-direction: row; align-items: center; gap: 10px; }
        .checkbox-group input { width: 20px; height: 20px; }
        
        .btn-action { background: #1a1a1a; color: #fff; padding: 15px 30px; border: none; text-transform: uppercase; letter-spacing: 1px; font-weight: 600; cursor: pointer; width: 100%; transition: background 0.2s; font-size: 0.9rem; }
        .btn-action:hover { background: #333; }
        
        /* Стил за списъка с проекти и резервации */
        .project-item-admin, .booking-item-admin { display: flex; justify-content: space-between; align-items: center; background: #fff; padding: 15px 20px; border: 1px solid #eadecc; margin-bottom: 12px; gap: 15px; transition: background-color 0.3s, border-color 0.3s; }
        .project-info-wrapper { display: flex; align-items: center; gap: 15px; }
        .admin-project-thumb { width: 65px; height: 65px; object-fit: cover; border: 1px solid #eadecc; flex-shrink: 0; }
        .admin-project-no-thumb { width: 65px; height: 65px; background: #f4eee5; border: 1px solid #eadecc; display: flex; align-items: center; justify-content: center; font-size: 0.65rem; color: #8c8275; text-align: center; flex-shrink: 0; text-transform: uppercase; }

        .admin-btns { display: flex; gap: 8px; flex-shrink: 0; align-items: center; }
        .btn-view { background: #1a1a1a; color: #fff; text-decoration: none; padding: 8px 12px; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; display: inline-flex; align-items: center; justify-content: center; border-radius: 3px; transition: background 0.2s; }
        .btn-view:hover { background: #333; }
        .btn-edit { background: #8c8275; color: #fff; border: none; padding: 8px 12px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; border-radius: 3px; }
        .btn-edit:hover { background: #736a5e; }
        .btn-delete { background: #a83232; color: #fff; border: none; padding: 8px 12px; cursor: pointer; font-size: 0.8rem; text-transform: uppercase; font-weight: 600; border-radius: 3px; }
        .btn-delete:hover { background: #872828; }

        /* Dark Mode Overrides */
        body.dark-mode { background-color: #121212 !important; color: #ffffff !important; }
        body.dark-mode header.navbar { background: #1a1a1a !important; border-bottom-color: #2c2c2c !important; }
        body.dark-mode header.navbar span { color: #ffffff !important; }
        body.dark-mode .admin-section { background: #1e1e1e !important; border-color: #2c2c2c !important; }
        body.dark-mode .admin-nav-tabs { border-bottom-color: #2c2c2c !important; }
        body.dark-mode .tab-btn { background: #252525 !important; border-color: #333 !important; color: #bbb !important; }
        body.dark-mode .tab-btn:hover { background: #333 !important; color: #fff !important; }
        body.dark-mode .tab-btn.active { background: #eadecc !important; color: #1a1a1a !important; border-color: #eadecc !important; }
        body.dark-mode .form-group input[type="text"], 
        body.dark-mode .form-group select, 
        body.dark-mode .form-group textarea,
        body.dark-mode .form-group input[type="file"] { background: #121212 !important; border-color: #444 !important; color: #ffffff !important; }
        body.dark-mode .project-item-admin, 
        body.dark-mode .booking-item-admin { background: #1e1e1e !important; border-color: #2c2c2c !important; }
        body.dark-mode .admin-project-no-thumb { background: #252525 !important; border-color: #333 !important; }
        body.dark-mode h1, 
        body.dark-mode h3, 
        body.dark-mode label,
        body.dark-mode .checkbox-group label { color: #ffffff !important; }
        body.dark-mode .btn-action { background-color: #eadecc; color: #1a1a1a; }
        body.dark-mode .btn-action:hover { background-color: #d4c8b6; }
        body.dark-mode .btn-view { background: #eadecc; color: #1a1a1a; }
        body.dark-mode .btn-view:hover { background: #d4c8b6; }

        /* МОБИЛНА ОПТИМИЗАЦИЯ */
        @media (max-width: 768px) {
            .admin-container { padding: 20px 4%; }
            .admin-nav-tabs { flex-direction: column; gap: 8px; }
            .tab-btn { width: 100%; min-width: 100%; padding: 14px; font-size: 0.8rem; }
            .admin-section { padding: 20px 15px; }
            h1 { font-size: 2rem !important; }
            .project-item-admin, .booking-item-admin { flex-direction: column; align-items: flex-start; gap: 12px; }
            .project-info-wrapper { width: 100%; }
            .admin-btns { width: 100%; display: flex; justify-content: flex-start; flex-wrap: wrap; }
            .btn-view, .btn-edit, .btn-delete { padding: 10px 14px; font-size: 0.85rem; flex: 1; text-align: center; }
        }
    </style>
</head>
<body>

    <header class="navbar" style="padding: 20px 5%; border-bottom: 1px solid #eadecc; display: flex; align-items: center; justify-content: space-between; background: #fbf9f4;">
        <a href="index.html" class="logo-area" style="display: flex; align-items: center; gap: 10px; text-decoration: none;">
            <svg style="height: 30px; width: 30px; fill: #8c8275;" viewBox="0 0 24 24">
                <path d="M12 3L2 12h3v8h14v-8h3L12 3zm0 2.84L17 10.5V18H7v-7.5l5-4.66z"/>
            </svg>
            <span style="font-weight: 500; color: var(--text-color, #1a1a1a); font-size: 1rem;">Academy Architect <span style="font-weight: 700; color: #8c8275;">Studio</span></span>
        </a>
        <button id="darkModeBtn" onclick="toggleDarkMode()" style="background: none; border: 1px solid var(--border-color, #eadecc); padding: 8px 12px; cursor: pointer; border-radius: 4px; color: inherit; font-size: 0.85rem;">🌙 Dark</button>
    </header>

    <main class="admin-container">
        <a href="index.html" class="back-home-link">← Назад към началната страница</a>
        
        <span style="font-size: 0.75rem; text-transform: uppercase; letter-spacing: 2px; color: #8c8275; font-weight: 700;">УПРАВЛЕНИЕ НА САЙТА</span>
        <h1 style="font-size: 2.5rem; font-weight: 400; margin-top: 5px; color: #1a1a1a; margin-bottom: 20px;">Админ Панел</h1>

        <!-- НАВИГАЦИЯ МЕЖДУ СТРАНИЦИТЕ / ТАБОВЕТЕ -->
        <div class="admin-nav-tabs">
            <button class="tab-btn active" onclick="switchTab('aboutTab', this)">📄 За нас</button>
            <button class="tab-btn" onclick="switchTab('contactTab', this)">📞 Контакти</button>
            <button class="tab-btn" onclick="switchTab('uploadTab', this)" id="uploadTabBtn">➕ Нов проект</button>
            <button class="tab-btn" onclick="switchTab('projectsTab', this)">🗂️ Проекти</button>
            <button class="tab-btn" onclick="switchTab('bookingsTab', this)">📅 Резервации</button>
        </div>
        
        <!-- СТРАНИЦА 1: РЕДАКЦИЯ "ЗА НАС" -->
        <div id="aboutTab" class="admin-section active">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;">Редакция на страница "За нас"</h3>
            <form id="aboutForm">
                <div class="form-group"><label>Заглавие</label><input type="text" id="aboutTitle"></div>
                <div class="form-group"><label>Основен текст / Описание</label><textarea id="aboutDesc" style="height: 150px;"></textarea></div>
                <button type="submit" class="btn-action">Запази промените "За нас"</button>
            </form>
        </div>

        <!-- СТРАНИЦА 2: РЕДАКЦИЯ "КОНТАКТИ" -->
        <div id="contactTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;">Редакция на страница "Контакти"</h3>
            <form id="contactForm">
                <div class="form-group"><label>Адрес на студиото</label><input type="text" id="contactAddress"></div>
                <div class="form-group"><label>Имейл адрес</label><input type="text" id="contactEmail"></div>
                <div class="form-group"><label>Телефонен номер</label><input type="text" id="contactPhone"></div>
                <button type="submit" class="btn-action">Запази промените "Контакти"</button>
            </form>
        </div>

        <!-- СТРАНИЦА 3: КАЧВАНЕ НА НОВ ПРОЕКТ -->
        <div id="uploadTab" class="admin-section">
            <h3 id="formTitle" style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;">Качване на нов проект</h3>
            <form id="uploadForm">
                <input type="hidden" id="editIndex" value="">

                <div class="form-group"><label>Име на проекта *</label><input type="text" id="title" required></div>
                
                <div class="form-group">
                    <label>Главна категория *</label>
                    <select id="mainCategory" required>
                        <option value="residential">🏠 Жилищна и многофамилна сграда</option>
                        <option value="commercial">🏢 Търговски обект и промишлена сграда</option>
                        <option value="interior">🛋️ Интериорен дизайн и обзавеждане</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Подкатегория (Тип разработка) *</label>
                    <select id="subCategory" required>
                        <option value="architecture">📐 Архитектурен проект</option>
                        <option value="3d">🖼️ 3D сграда / Визуализация</option>
                    </select>
                </div>

                <div class="form-group"><label>Описание</label><textarea id="desc"></textarea></div>
                <div class="form-group"><label>Площ (м²)</label><input type="text" id="area"></div>
                <div class="form-group"><label>Етажи</label><input type="text" id="floors"></div>
                <div class="form-group"><label>Спални</label><input type="text" id="beds"></div>
                <div class="form-group"><label>Бани</label><input type="text" id="baths"></div>
                <div class="form-group"><label>Материал / Конструкция</label><input type="text" id="material"></div>
                <div class="form-group"><label>Стил</label><input type="text" id="style"></div>
                <div class="form-group"><label>Цена (лв.)</label><input type="text" id="price"></div>
                
                <hr style="border: 0; border-top: 1px solid #eadecc; margin: 25px 0;">
                
                <div class="form-group"><label>Главна снимка</label><input type="file" id="mainImg"></div>
                <div class="form-group"><label>Разпределения / Планове (множество етажи)</label><input type="file" id="planImgs" multiple></div>
                <div class="form-group"><label>Фасади (може да изберете няколко)</label><input type="file" id="facadeImgs" multiple></div>
                <div class="form-group"><label>Разрез</label><input type="file" id="sectionImg"></div>
                <div class="form-group"><label>Допълнителни визуализации</label><input type="file" id="galleryImgs" multiple></div>

                <div class="form-group checkbox-group" style="margin-top: 20px;">
                    <input type="checkbox" id="isFav"> 
                    <label for="isFav" style="cursor: pointer; font-size: 0.85rem; font-weight: 600;">Фаворитен проект (на началната страница)</label>
                </div>
                
                <button type="submit" id="submitBtn" class="btn-action" style="margin-top: 20px;">Запази проекта в облака</button>
                <button type="button" id="cancelBtn" onclick="resetProjectForm()" class="btn-action" style="margin-top: 10px; background: #8c8275; display: none;">Отказ</button>
            </form>
        </div>

        <!-- СТРАНИЦА 4: СЪЩЕСТВУВАЩИ ПРОЕКТИ -->
        <div id="projectsTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;">Съществуващи проекти във Firebase</h3>
            <div id="adminProjectsList"></div>
        </div>

        <!-- СТРАНИЦА 5: РЕЗЕРВАЦИИ -->
        <div id="bookingsTab" class="admin-section">
            <h3 style="margin-top: 0; font-weight: 400; font-size: 1.3rem; margin-bottom: 20px;">Запазени консултации</h3>
            <div id="adminBookingsList"></div>
        </div>
    </main>

    <!-- СКРИПТОВЕ С FIREBASE СВЪРЗАНОСТ -->
    <script src="auth.js"></script>
    <script type="module">
        import { db, collection, addDoc, getDocs, doc, deleteDoc, updateDoc } from './firebase-config.js';

        let globalProjects = [];

        window.toggleDarkMode = function() {
            document.body.classList.toggle('dark-mode');
            if (document.body.classList.contains('dark-mode')) {
                localStorage.setItem('siteTheme', 'dark');
            } else {
                localStorage.setItem('siteTheme', 'light');
            }
        };

        window.switchTab = function(tabId, btnElement) {
            document.querySelectorAll('.admin-section').forEach(section => {
                section.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            
            document.getElementById(tabId).classList.add('active');
            if (btnElement) btnElement.classList.add('active');
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        function readFileAsDataURL(file) {
            return new Promise(resolve => {
                const reader = new FileReader();
                reader.onload = e => resolve(e.target.result);
                reader.readAsDataURL(file);
            });
        }

        window.addEventListener('DOMContentLoaded', () => {
            const savedAbout = JSON.parse(localStorage.getItem('siteAbout') || '{}');
            document.getElementById('aboutTitle').value = savedAbout.title || 'За нашето архитектурно студио';
            document.getElementById('aboutDesc').value = savedAbout.desc || 'Ние създаваме съвременни и функционални пространства...';

            const savedContact = JSON.parse(localStorage.getItem('siteContact') || '{}');
            document.getElementById('contactAddress').value = savedContact.address || 'Sofia · Plovdiv · Varna';
            document.getElementById('contactEmail').value = savedContact.email || 'info@architectstudio.com';
            document.getElementById('contactPhone').value = savedContact.phone || '+359 888 000 000';

            renderAdminList();
            renderAdminBookings();
        });

        document.getElementById('aboutForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const aboutData = {
                title: document.getElementById('aboutTitle').value,
                desc: document.getElementById('aboutDesc').value
            };
            localStorage.setItem('siteAbout', JSON.stringify(aboutData));
            alert('Страницата "За нас" е успешно обновена!');
        });

        document.getElementById('contactForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const contactData = {
                address: document.getElementById('contactAddress').value,
                email: document.getElementById('contactEmail').value,
                phone: document.getElementById('contactPhone').value
            };
            localStorage.setItem('siteContact', JSON.stringify(contactData));
            alert('Страницата "Контакти" е успешно обновена!');
        });

        // Зареждане на проектите от FIREBASE
        async function renderAdminList() {
            const listContainer = document.getElementById('adminProjectsList');
            listContainer.innerHTML = '<p style="color: #8c8275;">Зареждане на проекти от облака...</p>';

            try {
                const querySnapshot = await getDocs(collection(db, "projects"));
                globalProjects = [];
                
                querySnapshot.forEach((docSnap) => {
                    globalProjects.push({ id: docSnap.id, ...docSnap.data() });
                });

                if (globalProjects.length === 0) {
                    listContainer.innerHTML = `<p style="color: #8c8275;">Все още няма качени проекти във Firebase.</p>`;
                    return;
                }

                const mainCatNames = {
                    'residential': 'Жилищна',
                    'commercial': 'Търговска/Промишлена',
                    'interior': 'Интериор'
                };

                const subCatNames = {
                    'architecture': 'Архитектура',
                    '3d': '3D сграда'
                };

                listContainer.innerHTML = globalProjects.map((p) => {
                    let thumbHtml = p.mainImage 
                        ? `<img src="${p.mainImage}" alt="${p.title}" class="admin-project-thumb">`
                        : `<div class="admin-project-no-thumb">Няма снимка</div>`;

                    const mainCatLabel = mainCatNames[p.mainCategory] || 'Жилищна';
                    const subCatLabel = subCatNames[p.subCategory] || 'Архитектура';

                    return `
                        <div class="project-item-admin">
                            <div class="project-info-wrapper">
                                ${thumbHtml}
                                <div>
                                    <strong style="font-size: 1.05rem; display: block; margin-bottom: 3px;">${p.title}</strong>
                                    <div style="font-size: 0.8rem; color: #8c8275;">
                                        📁 ${mainCatLabel} (${subCatLabel}) | Стил: ${p.style || '-'} | Площ: ${p.area ? p.area + ' кв.м' : '-'}
                                    </div>
                                </div>
                            </div>
                            <div class="admin-btns">
                                <a href="project-details.html?id=${p.id}" target="_blank" class="btn-view">👁️ Преглед</a>
                                <button class="btn-edit" onclick="editProject('${p.id}')">Редактирай</button>
                                <button class="btn-delete" onclick="deleteProject('${p.id}')">Изтрий</button>
                            </div>
                        </div>
                    `;
                }).join('');
            } catch (err) {
                console.error("Грешка при извличане от Firebase: ", err);
                listContainer.innerHTML = `<p style="color: #a83232;">Грешка при зареждане на проектите от Firebase.</p>`;
            }
        }

        window.renderAdminBookings = function() {
            const listContainer = document.getElementById('adminBookingsList');
            const bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
            
            if (bookings.length === 0) {
                listContainer.innerHTML = `<p style="color: #8c8275;">Все още няма запазени резервации.</p>`;
                return;
            }

            listContainer.innerHTML = bookings.map((b, index) => {
                return `
                    <div class="booking-item-admin">
                        <div>
                            <strong style="font-size: 1.05rem; display: block; margin-bottom: 3px;">${b.name} (${b.phone})</strong>
                            <div style="font-size: 0.8rem; color: #8c8275;">Услуга: ${b.service} | Дата и час: ${b.datetime}</div>
                        </div>
                        <div class="admin-btns">
                            <button class="btn-delete" onclick="deleteBooking(${index})">Изтрий</button>
                        </div>
                    </div>
                `;
            }).join('');
        };

        window.deleteBooking = function(index) {
            if (confirm("Сигурни ли сте, че искате да изтриете тази резервация?")) {
                let bookings = JSON.parse(localStorage.getItem('studioBookings') || '[]');
                bookings.splice(index, 1);
                localStorage.setItem('studioBookings', JSON.stringify(bookings));
                renderAdminBookings();
            }
        };

        // Изтриване от FIREBASE
        window.deleteProject = async function(docId) {
            if (confirm("Сигурни ли сте, че искате да изтриете този проект от Firebase облака?")) {
                try {
                    await deleteDoc(doc(db, "projects", docId));
                    alert("Проектът беше изтрит от Firebase!");
                    renderAdminList();
                    resetProjectForm();
                } catch (err) {
                    console.error("Грешка при изтриване: ", err);
                    alert("Грешка при изтриване на проекта.");
                }
            }
        };

        // Редактиране
        window.editProject = function(docId) {
            const p = globalProjects.find(item => item.id === docId);
            if (!p) return;

            document.getElementById('editIndex').value = docId;
            document.getElementById('title').value = p.title || '';
            document.getElementById('mainCategory').value = p.mainCategory || 'residential';
            document.getElementById('subCategory').value = p.subCategory || 'architecture';
            document.getElementById('desc').value = p.desc || '';
            document.getElementById('area').value = p.area || '';
            document.getElementById('floors').value = p.floors || '';
            document.getElementById('beds').value = p.beds || '';
            document.getElementById('baths').value = p.baths || '';
            document.getElementById('material').value = p.material || '';
            document.getElementById('style').value = p.style || '';
            document.getElementById('price').value = p.price || '';
            document.getElementById('isFav').checked = p.isFavorite || false;

            document.getElementById('formTitle').innerText = "Редактиране на проект: " + p.title;
            document.getElementById('submitBtn').innerText = "Запази промените";
            document.getElementById('cancelBtn').style.display = 'block';
            document.getElementById('uploadTabBtn').innerText = "✏️ Редакция";

            window.switchTab('uploadTab', document.getElementById('uploadTabBtn'));
        };

        window.resetProjectForm = function() {
            document.getElementById('uploadForm').reset();
            document.getElementById('editIndex').value = '';
            document.getElementById('formTitle').innerText = "Качване на нов проект";
            document.getElementById('submitBtn').innerText = "Запази проекта в облака";
            document.getElementById('cancelBtn').style.display = 'none';
            document.getElementById('uploadTabBtn').innerText = "➕ Нов проект";
        };

        // Запис във FIREBASE
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const submitBtn = document.getElementById('submitBtn');
            submitBtn.disabled = true;
            submitBtn.innerText = "Записване във Firebase...";

            try {
                const editId = document.getElementById('editIndex').value;
                let existingProject = editId !== "" ? (globalProjects.find(item => item.id === editId) || {}) : {};

                const mainFile = document.getElementById('mainImg').files[0];
                const mainImage = mainFile ? await readFileAsDataURL(mainFile) : (existingProject.mainImage || '');

                const planFiles = document.getElementById('planImgs').files;
                let floorPlans = existingProject.floorPlans || (existingProject.planImage ? [existingProject.planImage] : []);
                if (planFiles.length > 0) {
                    floorPlans = await Promise.all(Array.from(planFiles).map(file => readFileAsDataURL(file)));
                }

                const facadeFiles = document.getElementById('facadeImgs').files;
                let facadeImages = existingProject.facadeImages || [];
                if (facadeFiles.length > 0) {
                    facadeImages = await Promise.all(Array.from(facadeFiles).map(file => readFileAsDataURL(file)));
                }

                const sectionFile = document.getElementById('sectionImg').files[0];
                const sectionImage = sectionFile ? await readFileAsDataURL(sectionFile) : (existingProject.sectionImage || '');

                const galleryFiles = document.getElementById('galleryImgs').files;
                let gallery = existingProject.gallery || [];
                if (galleryFiles.length > 0) {
                    gallery = await Promise.all(Array.from(galleryFiles).map(file => readFileAsDataURL(file)));
                }

                const projectData = {
                    title: document.getElementById('title').value,
                    mainCategory: document.getElementById('mainCategory').value,
                    subCategory: document.getElementById('subCategory').value,
                    desc: document.getElementById('desc').value,
                    area: document.getElementById('area').value,
                    floors: document.getElementById('floors').value,
                    beds: document.getElementById('beds').value,
                    baths: document.getElementById('baths').value,
                    material: document.getElementById('material').value,
                    style: document.getElementById('style').value,
                    price: document.getElementById('price').value,
                    isFavorite: document.getElementById('isFav').checked,
                    mainImage, floorPlans, facadeImages, sectionImage, gallery,
                    updatedAt: new Date()
                };

                if (editId !== "") {
                    await updateDoc(doc(db, "projects", editId), projectData);
                    alert("Проектът е успешно обновен във Firebase!");
                } else {
                    await addDoc(collection(db, "projects"), projectData);
                    alert("Проектът е успешно качен в облака Firebase!");
                }

                window.resetProjectForm();
                await renderAdminList();
                window.switchTab('projectsTab', document.querySelectorAll('.tab-btn')[3]);

            } catch (err) {
                console.error("Грешка при запис във Firebase: ", err);
                alert("Възникна грешка при качването във Firebase.");
            } finally {
                submitBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
