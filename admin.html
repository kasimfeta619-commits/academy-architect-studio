<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Админ Панел | Academy Architect</title>
    <style>
        body { font-family: sans-serif; padding: 40px; background: #fbf9f4; max-width: 800px; margin: auto; }
        .form-group { margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #1a1a1a; color: white; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>Админ Панел: Добавяне на проект</h2>
    <form id="uploadForm">
        <div class="form-group"><input type="text" id="title" placeholder="Име на проекта" required></div>
        <div class="form-group"><textarea id="desc" placeholder="Описание"></textarea></div>
        <div class="form-group"><input type="text" id="area" placeholder="Площ (м²)"></div>
        <div class="form-group"><input type="number" id="floors" placeholder="Брой етажи"></div>
        <div class="form-group"><input type="number" id="beds" placeholder="Брой спални"></div>
        <div class="form-group"><input type="number" id="baths" placeholder="Брой бани"></div>
        <div class="form-group"><input type="text" id="price" placeholder="Цена"></div>
        <div class="form-group"><label><input type="checkbox" id="isFav"> Фаворитен проект</label></div>
        <div class="form-group"><label>Снимка (за каталог)</label><input type="file" id="imgFile" accept="image/*" required></div>
        <button type="submit">Запази проекта</button>
    </form>

    <script>
        document.getElementById('uploadForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const reader = new FileReader();
            reader.onload = (e) => {
                const project = {
                    title: document.getElementById('title').value,
                    desc: document.getElementById('desc').value,
                    area: document.getElementById('area').value,
                    floors: document.getElementById('floors').value,
                    beds: document.getElementById('beds').value,
                    baths: document.getElementById('baths').value,
                    price: document.getElementById('price').value,
                    isFav: document.getElementById('isFav').checked,
                    img: e.target.result
                };
                
                // Взимаме списъка, добавяме новия проект и записваме обратно
                let list = JSON.parse(localStorage.getItem('myProjects') || '[]');
                list.push(project);
                localStorage.setItem('myProjects', JSON.stringify(list));
                
                alert("Проектът е успешно запазен и вече е достъпен в каталога!");
                location.reload();
            };
            reader.readAsDataURL(document.getElementById('imgFile').files[0]);
        });
    </script>
</body>
</html>
