<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>About Us | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/main-graphic.png" alt="Лого на студиото" class="logo-icon" onerror="this.style.display='none'">
            <span class="logo-studio" data-key="nav-studio">Academy Architect Studio</span>
        </a>
        
        <div id="nav-links">
            <a href="index.html" data-key="nav-home">Home</a>
            <a href="catalog.html" data-key="nav-catalog">Projects</a>
            <a href="about.html" class="active" data-key="nav-about">About Us</a>

        <div class="header-actions">

            <div class="lang-switcher">
                <button class="lang-btn active" onclick="setLanguage('en')">EN</button>
                <button class="lang-btn" onclick="setLanguage('bg')">BG</button>
            </div>
            <a href="booking.html" class="btn-login" style="margin-left: 10px;" data-key="nav-booking">Booking</a>

        </div>
    </nav>

    <main style="padding: 60px 8%; max-width: 900px; margin: 0 auto;">
        <h1 data-key="nav-about" style="font-size: 2.5rem; margin-bottom: 20px;">About Us</h1>
        <p style="color: #8c8275; line-height: 1.6; font-size: 1.1rem;" data-key="hero-desc">We create minimalist and functional spaces, combining modern technologies with clean architecture.</p>

    <script src="translations.js"></script>
    <script>
        document.addEventListener("DOMContentLoaded", function() {
            initLanguage();
        });
