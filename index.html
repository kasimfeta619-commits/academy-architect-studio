<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header class="navbar">
        <a href="index.html" class="logo-area">
            <img src="assets/logo.png" alt="Logo" class="logo-icon" onerror="this.src='https://placehold.co/150x50?text=Logo'">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
        <nav id="nav-links">
            <a href="index.html" class="active" data-key="nav-home">Home</a>
            <a href="catalog.html" data-key="nav-catalog">Catalog</a>
        </nav>
        <div class="header-actions">
            <div class="lang-switcher">
                <button class="lang-btn active" onclick="changeLanguage('en')">EN</button>
                <button class="lang-btn" onclick="changeLanguage('bg')">BG</button>
            </div>
        </div>
    </header>

    <main class="hero-section">
        <div class="hero-text-area">
            <span class="eyebrow" id="hero-eyebrow">ARCHITECTURAL STUDIO</span>
            <h1 id="hero-title">We design the future houses</h1>
            <p id="hero-desc">Modern, energy-efficient and custom tailored living concepts for your family.</p>
            <a href="catalog.html" class="btn-primary" id="hero-btn">Explore Catalog</a>
        </div>
        <div class="hero-image-area">
            <div class="hero-main-img">
                <img src="assets/hero-blueprint.png" alt="House Blueprint" onerror="this.src='https://placehold.co/500x400?text=Hero+Blueprint'">
            </div>
            <div class="latest-badge">
                <span class="badge-title">LATEST</span>
                <span class="badge-sub">Timber-Stone series</span>
            </div>
        </div>
    </main>

    <script>
        const translations = {
            en: { "nav-home": "Home", "nav-catalog": "Catalog", "hero-eyebrow": "ARCHITECTURAL STUDIO", "hero-title": "We design the future houses", "hero-desc": "Modern, energy-efficient and custom tailored living concepts for your family.", "hero-btn": "Explore Catalog" },
            bg: { "nav-home": "Начало", "nav-catalog": "Каталог", "hero-eyebrow": "АРХИТЕКТУРНО СТУДИО", "hero-title": "Ние проектираме къщите на бъдещето", "hero-desc": "Модерни, енергийноефективни и индивидуални концепции за вашия дом.", "hero-btn": "Виж каталога" }
        };
        function changeLanguage(lang) {
            document.querySelectorAll('#nav-links a').forEach(link => {
                const key = link.getAttribute('data-key');
                if (translations[lang][key]) link.innerText = translations[lang][key];
            });
            document.getElementById('hero-eyebrow').innerText = translations[lang]['hero-eyebrow'];
            document.getElementById('hero-title').innerText = translations[lang]['hero-title'];
            document.getElementById('hero-desc').innerText = translations[lang]['hero-desc'];
            document.getElementById('hero-btn').innerText = translations[lang]['hero-btn'];
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>
</body>
</html>
