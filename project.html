<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Преглед на проект | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .back-link {
            display: inline-block;
            margin: 30px 0;
            color: #1a1a1a;
            text-decoration: none;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }
        .project-details-container {
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 50px;
            margin-bottom: 60px;
        }
        @media (max-width: 900px) {
            .project-details-container { grid-template-columns: 1fr; }
        }
        .main-project-img {
            width: 100%;
            height: auto;
            border: 1px solid #eadecc;
            object-fit: cover;
        }
        .project-meta-side {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        .project-subtitle {
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #8c8275;
        }
        .project-main-title {
            font-size: 2.5rem;
            font-weight: 400;
            margin: 0 0 15px 0;
            color: #1a1a1a;
        }
        .project-full-desc {
            font-size: 1rem;
            line-height: 1.7;
            color: #444;
            margin-bottom: 30px;
        }
        .specs-table {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            border-top: 1px solid #eadecc;
            padding-top: 25px;
        }
        .spec-item h5 {
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #8c8275;
            margin: 0 0 5px 0;
        }
        .spec-item p {
            font-size: 1.1rem;
            font-weight: 500;
            color: #1a1a1a;
            margin: 0;
        }
        .gallery-section {
            margin-top: 40px;
            border-top: 1px solid #eadecc;
            padding-top: 30px;
        }
        .gallery-tabs {
            display: flex;
            gap: 20px;
            margin-bottom: 25px;
            font-size: 0.9rem;
            border-bottom: 1px solid #eadecc;
            padding-bottom: 10px;
        }
        .tab-active {
            color: #1a1a1a;
            border-bottom: 2px solid #1a1a1a;
            padding-bottom: 9px;
            font-weight: 600;
        }
        .gallery-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 20px;
        }
        .gallery-item {
            border: 1px solid #eadecc;
            background: #fff;
            padding: 10px;
        }
        .gallery-item img {
            width: 100%;
            height: auto;
            display: block;
        }
    </style>
</head>
<body>

    <!-- НАВИГАЦИЯ -->
    <header class="navbar">
        <a href="index.html" class="logo-area">
            <span>Academy Architect <span class="logo-studio">Studio</span></span>
        </a>
    </header>

    <!-- ОСНОВНО СЪДЪРЖАНИЕ -->
    <main class="content-container" style="padding: 0 10%; background-color: #fbf9f4; min-height: 80vh;">
        <a href="catalog.html" class="back-link">← Назад към каталога</a>

        <div class="project-details-container">
            <!-- Лява страна: Голяма снимка -->
            <div>
                <img id="mainImg" src="" alt="Проект" class="main-project-img">
                
                <!-- Галерия / Чертежи долу под голямата снимка -->
                <div class="gallery-section">
                    <div class="gallery-tabs">
                        <span class="tab-active">Чертежи и планове</span>
                    </div>
                    <div class="gallery-grid" id="galleryGrid">
                        <!-- Тук за демото повтаряме основната снимка като "чертеж" -->
                    </div>
                </div>
            </div>

            <!-- Дясна страна: Текст и Спецификации -->
            <div class="project-meta-side">
                <div>
                    <span class="project-subtitle" id="projSubtitle">MODERN MINIMALIST</span>
                    <h1 class="project-main-title" id="projTitle">Име на проекта</h1>
                    <p class="project-full-desc" id="projDesc">Описание...</p>
                </div>

                <!-- Таблица с параметри -->
                <div class="specs-table">
                    <div class="spec-item">
                        <h5>Обща Площ</h5>
                        <p id="specArea">120 m²</p>
                    </div>
                    <div class="spec-item">
                        <h5>Етажи</h5>
                        <p id="specFloors">1</p>
                    </div>
                    <div class="spec-item">
                        <h5>Спални</h5>
                        <p id="specBedrooms">2</p>
                    </div>
                    <div class="spec-item">
                        <h5>Бани</h5>
                        <p id="specBathrooms">1</p>
                    </div>
                    <div class="spec-item">
                        <h5>Материал</h5>
                        <p>Wood + stucco</p>
                    </div>
                    <div class="spec-item">
                        <h5>Стил</h5>
                        <p id="specStyle">Minimalist</p>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script>
        window.onload = function() {
            // 1. Взимаме ID-то на проекта от линка (напр. ?id=0)
            const urlParams = new URLSearchParams(window.location.search);
            const projectId = urlParams.get('id');

            // 2. Взимаме проектите от паметта
            const savedProjects = JSON.parse(localStorage.getItem('myProjects')) || [];
            const project = savedProjects[projectId];

            if (!project) {
                document.body.innerHTML = "<h2 style='text-align:center; margin-top:50px;'>Проектът не е намерен!</h2>";
                return;
            }

            // 3. Пълним данните в HTML елементите
            document.getElementById('projTitle').innerText = project.title;
            document.getElementById('projDesc').innerText = project.description;
            document.getElementById('mainImg').src = project.image;
            
            // Динамично генериране на малки чертежи отдолу за визия (използваме същата снимка като пример)
            const galleryGrid = document.getElementById('galleryGrid');
            galleryGrid.innerHTML = `
                <div class="gallery-item"><img src="${project.image}"></div>
                <div class="gallery-item"><img src="${project.image}"></div>
            `;
        }
    </script>
</body>
</html>
