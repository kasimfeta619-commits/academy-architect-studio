<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Преглед на проект | Academy Architect Studio</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .project-wrapper { display: grid; grid-template-columns: 2fr 1fr; gap: 60px; padding: 40px 10%; background: #fbf9f4; }
        .specs-column { background: #fbf9f4; border-left: 1px solid #eadecc; padding-left: 30px; }
        
        /* Стилизиране на техническите данни в 2 колони */
        .specs-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .spec-item h5 { color: #888; text-transform: uppercase; font-size: 0.65rem; margin: 0 0 5px 0; letter-spacing: 1px; }
        .spec-item p { font-size: 1.1rem; font-weight: bold; margin: 0; color: #1a1a1a; }
        
        .gallery-nav { margin: 20px 0; border-bottom: 1px solid #eadecc; padding-bottom: 10px; }
        .tab-btn { background: none; border: none; font-size: 1rem; cursor: pointer; margin-right: 20px; font-weight: bold; color: #888; }
        .tab-btn:hover { color: #1a1a1a; }
    </style>
</head>
<body>

    <main class="project-wrapper">
        <!-- Лява част -->
        <div>
            <a href="catalog.html" style="color:#1a1a1a;">← Назад</a>
            <h1 id="projTitle" style="font-size: 3rem; margin: 20px 0;"></h1>
            <p id="projDesc" style="line-height: 1.6;"></p>
            
            <div class="gallery-nav">
                <button class="tab-btn" onclick="show('gallery')">Галерия</button>
                <button class="tab-btn" onclick="show('plans')">Планове по етажи</button>
            </div>
            <div id="displayArea"></div>
        </div>

        <!-- Дясна част -->
        <div class="specs-column">
            <h4 id="projStyle" style="color: #888; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 1px;"></h4>
            <h2 id="projTitleSide" style="margin-top: 0;"></h2>
            <hr style="margin: 20px 0; border: 0; border-top: 1px solid #eadecc;">
            
            <div class="specs-grid">
                <div class="spec-item"><h5>Обща площ</h5><p id="dArea"></p></div>
                <div class="spec-item"><h5>Етажи</h5><p id="dFloors"></p></div>
                <div class="spec-item"><h5>Спални</h5><p id="dBeds"></p></div>
                <div class="spec-item"><h5>Бани</h5><p id="dBaths"></p></div>
                <div class="spec-item"><h5>Гаражни места</h5><p id="dGarage"></p></div>
                <div class="spec-item"><h5>Материал</h5><p id="dMat"></p></div>
                <div class="spec-item"><h5>Стил</h5><p id="dStyle"></p></div>
                <div class="spec-item"><h5>Цена</h5><p id="dPrice"></p></div>
            </div>
        </div>
    </main>

    <script>
        const id = new URLSearchParams(window.location.search).get('id');
        const projects = JSON.parse(localStorage.getItem('myProjects')) || [];
        const p = projects[id];

        if (p) {
            document.getElementById('projTitle').innerText = p.title;
            document.getElementById('projTitleSide').innerText = p.title;
            document.getElementById('projDesc').innerText = p.description;
            document.getElementById('projStyle').innerText = p.style;

            document.getElementById('dArea').innerText = p.area ? p.area + " m²" : "—";
            document.getElementById('dFloors').innerText = p.floors || "—";
            document.getElementById('dBeds').innerText = p.beds || "—";
            document.getElementById('dBaths').innerText = p.baths || "—";
            document.getElementById('dGarage').innerText = p.garage || "0";
            document.getElementById('dMat').innerText = p.material || "—";
            document.getElementById('dStyle').innerText = p.style || "—";
            document.getElementById('dPrice').innerText = p.price || "—";
            
            window.show = (type) => {
                const arr = (type === 'gallery') ? p.gallery : p.plans;
                document.getElementById('displayArea').innerHTML = arr.map(img => 
                    `<img src="${img}" style="width:100%; margin-bottom:20px; border:1px solid #eadecc;">`).join('');
            };
            show('gallery');
        }
    </script>
</body>
</html>
