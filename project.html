<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>Преглед на проект</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="padding: 50px; background: #fbf9f4;">
    <a href="catalog.html">← Назад</a>
    <h1 id="projTitle"></h1>
    <p id="projDesc"></p>

    <div class="tabs">
        <button onclick="show('gallery')">Галерия</button>
        <button onclick="show('plans')">Планове</button>
    </div>
    
    <div id="displayArea" style="margin-top: 30px; display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px;"></div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const id = params.get('id');
        const project = JSON.parse(localStorage.getItem('myProjects'))[id];

        document.getElementById('projTitle').innerText = project.title;
        document.getElementById('projDesc').innerText = project.description;

        function show(type) {
            const arr = (type === 'gallery') ? project.gallery : project.plans;
            document.getElementById('displayArea').innerHTML = arr.map(img => 
                `<img src="${img}" style="width:100%; border:1px solid #ccc;">`).join('');
        }
        show('gallery'); // покажи галерията по подразбиране
    </script>
</body>
</html>
